function openSellModal(p, section, onSaved) {
  const allAccounts = [...(D.liquiditesInvest||[]), ...(D.compteCourants||[])];
  const acc = allAccounts.find(a => a.name === p.account);
  const accountColor = acc ? ((D.banks||[]).find(b => b.name === acc.bank)?.color || "#888") : "#888";

  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:#00000088;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";
  overlay.innerHTML = `
    <div style="background:var(--surface);border:1px solid #f0a02055;border-radius:var(--radius);padding:0;width:100%;max-width:460px;animation:fadeUp .2s ease">
      <div class="card-title">Vendre — ${p.name}</div>
      <div style="padding:6px 20px 20px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
          <div class="form-group" style="margin:0;grid-column:1/-1">
            <label>Compte</label>
            <div style="font-family:var(--font-mono);font-size:var(--text-md);color:${accountColor};border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px;height:var(--input-h);display:flex;align-items:center">${p.account || "—"}</div>
          </div>
          <div class="form-group" style="margin:0;grid-column:1/-1">
            <label>Quantité disponible</label>
            <div style="font-family:var(--font-mono);font-size:var(--text-md);color:var(--text);border:1px solid var(--border2);border-radius:var(--radius);padding:0 10px;height:var(--input-h);display:flex;align-items:center">${(p.qty||0).toLocaleString("fr-FR",{maximumFractionDigits:4})}</div>
          </div>
          <div class="form-group" style="margin:0">
            <label>Quantité à vendre</label>
            <input class="form-input" type="number" id="sell-qty" step="any" min="0" max="${p.qty||0}" placeholder="0" style="font-family:var(--font-mono)">
          </div>
          <div class="form-group" style="margin:0">
            <label>Prix de vente (€)</label>
            <input class="form-input" type="number" id="sell-price" step="any" min="0" placeholder="${(p.price||0).toFixed(2)}" style="font-family:var(--font-mono)" value="${p.price||""}">
          </div>
          <div class="form-group" style="margin:0;grid-column:1/-1">
            <label>Frais (€)</label>
            <input class="form-input" type="number" id="sell-fees" step="any" min="0" placeholder="0" value="0" style="font-family:var(--font-mono)">
          </div>
        </div>
        <div style="margin-bottom:16px;display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;justify-content:space-between;font-size:var(--text-md)">
            <span style="color:var(--text2)">Produit net</span>
            <span id="sell-net" style="font-family:var(--font-mono);color:var(--text)">—</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:var(--text-md)">
            <span style="color:var(--text2)">P&L réalisé</span>
            <span id="sell-pnl" style="font-family:var(--font-mono);color:var(--text)">—</span>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:var(--text-md)">
            <span style="color:var(--text2)">Liquidité après vente</span>
            <span id="sell-after" style="font-family:var(--font-mono);font-weight:600;color:var(--text)">—</span>
          </div>
        </div>
        <div class="form-actions" style="padding:0">
          <button class="app-btn app-btn--rect" id="sell-cancel">Annuler</button>
          <button class="app-btn app-btn--rect app-btn--primary" id="sell-confirm" disabled style="opacity:.4;cursor:not-allowed">Valider la vente</button>
        </div>
      </div>
    </div>`;

  document.body.appendChild(overlay);
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
  overlay.addEventListener("keydown", e => { if (e.key === "Escape") overlay.remove(); });
  document.getElementById("sell-cancel").addEventListener("click", () => overlay.remove());

  const qtyEl     = document.getElementById("sell-qty");
  const priceEl   = document.getElementById("sell-price");
  const feesEl    = document.getElementById("sell-fees");
  const netEl     = document.getElementById("sell-net");
  const pnlEl     = document.getElementById("sell-pnl");
  const afterEl   = document.getElementById("sell-after");
  const confirmBtn = document.getElementById("sell-confirm");

  const update = () => {
    const qty   = parseFloat(qtyEl.value)   || 0;
    const price = parseFloat(priceEl.value) || 0;
    const fees  = parseFloat(feesEl.value)  || 0;
    const net   = qty * price - fees;
    const pruEur = (p.pruCurrency && p.pruCurrency !== "EUR") ? (p.pru||0) * (fxRates[p.pruCurrency]||1) : (p.pru||0);
    const pnl   = qty * price - qty * pruEur - fees;
    const liq   = acc ? (acc.amount || 0) : 0;
    const after = liq + net;
    const ok    = qty > 0 && price > 0 && qty <= (p.qty || 0);

    netEl.textContent   = qty > 0 && price > 0 ? eur(net)  : "—";
    pnlEl.textContent   = qty > 0 && price > 0 ? eur(pnl)  : "—";
    pnlEl.style.color   = pnl >= 0 ? "var(--gain)" : "var(--loss)";
    afterEl.textContent = qty > 0 && price > 0 ? eur(after) : "—";
    afterEl.style.color = "var(--text)";

    confirmBtn.disabled      = !ok;
    confirmBtn.style.opacity = ok ? "1" : ".4";
    confirmBtn.style.cursor  = ok ? "pointer" : "not-allowed";
  };

  qtyEl.addEventListener("input", update);
  priceEl.addEventListener("input", update);
  feesEl.addEventListener("input", update);
  setTimeout(() => qtyEl.focus(), 50);

  document.getElementById("sell-confirm").addEventListener("click", () => {
    const qty   = parseFloat(qtyEl.value)   || 0;
    const price = parseFloat(priceEl.value) || 0;
    const fees  = parseFloat(feesEl.value)  || 0;
    const net   = qty * price - fees;
    const pruEur = (p.pruCurrency && p.pruCurrency !== "EUR") ? (p.pru||0) * (fxRates[p.pruCurrency]||1) : (p.pru||0);
    const pnl   = Math.round((qty * price - qty * pruEur - fees) * 100) / 100;

    // Mise à jour position
    p.qty = Math.round(((p.qty || 0) - qty) * 1e8) / 1e8;
    p.cost   = p.qty * pruEur;
    p.market = p.qty * (p.price || price);
    p.pnl    = p.market - p.cost;
    p.perf   = p.cost > 0 ? (p.market / p.cost - 1) * 100 : 0;

    // Créditer le compte
    if (acc) acc.amount = Math.round((acc.amount + net) * 100) / 100;

    saveData();
    overlay.remove();
    if (onSaved) onSaved();
    const sign = pnl >= 0 ? "+" : "";
    toast(`Vente enregistrée ✓  —  P&L : ${sign}${eur(pnl)}`);
  });
}

  const qtyEl   = document.getElementById("buy-qty");
  const priceEl = document.getElementById("buy-price");
  const feesEl  = document.getElementById("buy-fees");
  const totalEl = document.getElementById("buy-total");
  const pruEl   = document.getElementById("buy-pru");
  const afterEl = document.getElementById("buy-after");
  const confirmBtn = document.getElementById("buy-confirm");

  const update = () => {
    const qty   = parseFloat(qtyEl.value)   || 0;
    const price = parseFloat(priceEl.value) || 0;
    const fees  = parseFloat(feesEl.value)  || 0;
    const total = qty * price + fees;
    const liq   = getLiquidite();
    const after = liq - total;
    const ok    = qty > 0 && price > 0 && total <= liq;

    const oldQty = p.qty || 0;
    const oldPru = (p.pruCurrency && p.pruCurrency !== "EUR") ? (p.pru || 0) * (fxRates[p.pruCurrency] || 1) : (p.pru || 0);
    const newPru = qty > 0 && price > 0 ? (oldQty + qty > 0 ? (oldPru * oldQty + price * qty) / (oldQty + qty) : price) : null;

    totalEl.textContent = qty > 0 && price > 0 ? eur(total) : "—";
    pruEl.textContent   = newPru !== null ? eur(newPru) : "—";
    afterEl.textContent = qty > 0 && price > 0 ? eur(after) : "—";
    afterEl.style.color = after >= 0 ? "var(--gain)" : "var(--loss)";

    confirmBtn.disabled = !ok;
    confirmBtn.style.opacity = ok ? "1" : ".4";
    confirmBtn.style.cursor  = ok ? "pointer" : "not-allowed";
  };

  qtyEl.addEventListener("input", update);
  priceEl.addEventListener("input", update);
  feesEl.addEventListener("input", update);
  setTimeout(() => qtyEl.focus(), 50);

  document.getElementById("buy-confirm").addEventListener("click", () => {
    const qty   = parseFloat(qtyEl.value)   || 0;
    const price = parseFloat(priceEl.value) || 0;
    const fees  = parseFloat(feesEl.value)  || 0;
    const total = qty * price + fees;

    // PRU pondéré (en EUR)
    const oldQty  = p.qty  || 0;
    const oldPru  = (p.pruCurrency && p.pruCurrency !== "EUR") ? (p.pru || 0) * (fxRates[p.pruCurrency] || 1) : (p.pru || 0);
    const newPru  = oldQty + qty > 0 ? (oldPru * oldQty + price * qty) / (oldQty + qty) : price;

    // Mise à jour position
    p.qty = oldQty + qty;
    p.pru = newPru;
    p.pruCurrency = "EUR";
    p.cost   = p.qty * newPru;
    p.market = p.qty * (p.price || price);
    p.pnl    = p.market - p.cost;
    p.perf   = p.cost > 0 ? (p.market / p.cost - 1) * 100 : 0;

    // Déduire du compte
    if (acc) acc.amount = Math.round((acc.amount - total) * 100) / 100;

    saveData();
    overlay.remove();
    if (onSaved) onSaved();
    toast("Achat enregistré ✓");
  });
}

let _bourseRefreshBtn = null; // initialisé par investissements()

async function fetchYahooPrice(ticker) {
  const proxies = [
    `https://corsproxy.io/?url=https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1d&range=1d`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`)}`,
  ];
  for (const url of proxies) {
    try {
      const r = await fetch(url, {signal: AbortSignal.timeout(8000)});
      if (!r.ok) continue;
      const j = await r.json();
      const meta = j?.chart?.result?.[0]?.meta;
      const price = meta?.regularMarketPrice;
      if (price == null || isNaN(price)) continue;
      const europeanSuffixes = ['.PA','.F','.AS','.MI','.MC','.BR','.LS','.ST','.HE','.CO','.OL','.VX','.SW'];
      const isEuropean = europeanSuffixes.some(s => ticker.toUpperCase().endsWith(s.toUpperCase()));
      const currency = (meta?.currency || "EUR").toUpperCase();
      if (currency === "EUR" || isEuropean) return price;
      const rate = fxRates[currency];
      return rate ? price * rate : price;
    } catch { continue; }
  }
  return null;
}

async function fetchBinancePrice(symbol) {
  try {
    const sym = symbol.toUpperCase().replace("/","").replace("-","");
    const url = `https://api.binance.com/api/v3/ticker/price?symbol=${sym}`;
    const r = await fetch(url, {signal: AbortSignal.timeout(8000)});
    if (!r.ok) return null;
    const j = await r.json();
    if (!j?.price) return null;
    const priceUSD = parseFloat(j.price);
    const usdToEur = fxRates["USD"] || 1;
    return priceUSD * usdToEur;
  } catch { return null; }
}

async function refreshPrices(silent = false, triggerBtn = null) {
  const _animBtns = [
    ...(_bourseRefreshBtn ? [_bourseRefreshBtn] : []),
    ...(triggerBtn && triggerBtn !== _bourseRefreshBtn ? [triggerBtn] : [])
  ];
  if (!silent) {
    _animBtns.forEach(b => { b.style.setProperty("--card-border", "var(--amber)"); b.style.setProperty("--card-text", "var(--amber)"); b.style.opacity = "0.6"; });
  }
  let updated = 0, failed = 0;

  const recalc = (pos) => {
    pos.market = pos.qty * pos.price;
    const pruEur = (pos.pruCurrency && pos.pruCurrency !== "EUR") ? pos.pru * (fxRates[pos.pruCurrency] || 1) : pos.pru;
    pos.cost   = pos.qty * pruEur;
    pos.pnl    = pos.market - pos.cost;
    pos.perf   = pos.cost > 0 ? (pos.market / pos.cost - 1) * 100 : 0;
  };

  const recalcWeights = (arr) => {
    const tot = arr.reduce((s,p) => s + (p.market||0), 0);
    arr.forEach(p => { p.weight = tot > 0 ? p.market/tot*100 : 0; });
  };

  for (const sec of ["etfPositions","stockPositions"]) {
    for (const pos of (D[sec]||[])) {
      if (!pos.ticker) continue;
      const price = await fetchYahooPrice(pos.ticker);
      if (price != null) { pos.price = price; pos._tickerError = false; recalc(pos); updated++; }
      else { pos._tickerError = true; failed++; }
    }
    recalcWeights(D[sec]||[]);
  }

  for (const pos of (D.cryptoPositions||[])) {
    if (!pos.ticker) continue;
    const sym = pos.ticker.toUpperCase().endsWith("USDT") ? pos.ticker.toUpperCase() : pos.ticker.toUpperCase()+"USDT";
    const price = await fetchBinancePrice(sym);
    if (price != null) { pos.price = price; pos._tickerError = false; recalc(pos); updated++; }
    else { pos._tickerError = true; failed++; }
  }
  recalcWeights(D.cryptoPositions||[]);

  saveData();

  document.querySelectorAll("tr[data-section][data-idx]").forEach(tr => {
    const sec = tr.dataset.section;
    const idx = parseInt(tr.dataset.idx);
    const p = (D[sec]||[])[idx];
    if (!p) return;
    const cell = (attr) => tr.querySelector(`[data-live="${attr}"]`);
    if (cell("market")) cell("market").textContent = eur(p.market);
    if (cell("pnl")) { cell("pnl").textContent = eur(p.pnl); cell("pnl").className = p.pnl >= 0 ? "text-gain" : "text-loss"; }
    if (cell("perf")) { cell("perf").innerHTML = `<span class="pnl-badge ${p.perf>=0?'up':'down'}">${pct(p.perf)}</span>`; }
    if (cell("weight")) cell("weight").textContent = p.weight.toFixed(1)+"%";
    const priceTd = cell("price");
    if (priceTd) {
      priceTd.innerHTML = (p._tickerError ? '<span style="background:var(--loss)20;color:var(--loss);border:1px solid #e0505044;border-radius:4px;font-size:var(--text-md);padding:1px 4px;margin-right:3px;font-family:var(--font-body)">⚠</span>' : "") + eur(p.price||0);
    }
  });

  document.dispatchEvent(new Event("datachanged"));
  if (!silent) {
    _animBtns.forEach(b => { b.style.removeProperty("--card-border"); b.style.removeProperty("--card-text"); b.style.opacity = "1"; });
    if (updated === 0 && failed === 0) {
      toast("Aucun actif à mettre à jour");
    } else {
      toast(`Prix mis à jour : ${updated} actif${updated>1?"s":""} ✓${failed>0?` — ${failed} échec${failed>1?"s":""}`:""}`, failed > 0 ? 4000 : 2000);
    }
  }
}

    const suggestionsEl = document.getElementById("pos-ticker-suggestions");
    let searchTimeout = null;

    const isCrypto = () => document.getElementById("pos-section").value === "cryptoPositions";

    const showSuggestions = (results) => {
      suggestionsEl.innerHTML = "";
      if (!results.length) { suggestionsEl.style.display = "none"; return; }
      results.forEach(r => {
        const item = document.createElement("div");
        item.className = "suggestion-item";
        item.innerHTML = `<span style="font-family:var(--font-mono);color:var(--amber);min-width:70px">${r.symbol}</span><span style="color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.name}</span><span style="color:var(--text3)">${r.exchange||""}</span>`;
        item.addEventListener("pointerdown", e => {
          e.preventDefault();
          e.stopPropagation();
          tickerInput.value = r.symbol;
          const nameField = document.getElementById("pos-name");
          if (!nameField.value) nameField.value = r.name;
          suggestionsEl.style.display = "none";
        });
        suggestionsEl.appendChild(item);
      });
      suggestionsEl.style.display = "block";
    };

    const searchTicker = async (q) => {
      if (q.length < 2) { suggestionsEl.style.display = "none"; return; }
      if (isCrypto()) {
        try {
          const r = await fetch("https://api.binance.com/api/v3/exchangeInfo", {signal: AbortSignal.timeout(5000)});
          const j = await r.json();
          const matches = (j.symbols||[])
            .filter(s => s.quoteAsset === "USDT" && s.baseAsset.toUpperCase().startsWith(q.toUpperCase()))
            .slice(0, 8)
            .map(s => ({ symbol: s.baseAsset, name: s.baseAsset, exchange: "Binance" }));
          showSuggestions(matches);
        } catch { suggestionsEl.style.display = "none"; }
      } else {
        try {
          const url = `https://corsproxy.io/?url=${encodeURIComponent(`https://query1.finance.yahoo.com/v1/finance/search?q=${q}&lang=fr-FR&newsCount=0&quotesCount=8`)}`;
          const r = await fetch(url, {signal: AbortSignal.timeout(5000)});
          const j = await r.json();
          const matches = (j.quotes||[])
            .filter(q => ["EQUITY","ETF","MUTUALFUND"].includes(q.quoteType))
            .slice(0, 8)
            .map(q => ({ symbol: q.symbol, name: q.longname || q.shortname || q.symbol, exchange: q.exchDisp||"" }));
          showSuggestions(matches);
        } catch { suggestionsEl.style.display = "none"; }
      }
    };

    tickerInput.addEventListener("input", e => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => searchTicker(e.target.value.trim()), 350);
    });
    tickerInput.addEventListener("blur", () => setTimeout(() => { suggestionsEl.style.display = "none"; }, 300));
    tickerInput.addEventListener("focus", e => { if (e.target.value.length >= 2) searchTicker(e.target.value.trim()); });
    suggestionsEl.addEventListener("pointerdown", e => e.stopPropagation());

    // Mise à jour du select Compte quand la catégorie change
    const secEl = document.getElementById("pos-section");
    if (secEl.tagName === "SELECT") {
      secEl.addEventListener("change", e => {
        document.getElementById("pos-account").innerHTML = accountOpts(e.target.value);
        const catSel = document.getElementById("pos-category");
        catSel.innerHTML = `<option value="">— Aucune —</option>${catOpts(e.target.value)}`;
      });
    }

    const close = () => overlay.remove();
    overlay.addEventListener("pointerdown", e => { if (e.target === overlay) close(); });
    // ── Calcul montant invest auto ───────────────────────────────────────────
    const secToDcaKey = { etfPositions: 'dcaETF', stockPositions: 'dcaActions', cryptoPositions: 'dcaCrypto' };
    const updateAutoAmount = () => {
      const amountEl = document.getElementById('pos-auto-amount');
      const checkbox = document.getElementById('pos-auto-invest');
      const targetInput = document.getElementById('pos-target');
      if (!amountEl || !checkbox) return;
      const isChecked = checkbox.checked;
      const target = parseFloat(targetInput?.value) || 0;
      const section = document.getElementById('pos-section')?.value || defaultSec;
      const dcaKey = secToDcaKey[section];
      const dcaPct = dcaKey ? (D.virements[dcaKey] || 0) : 0;
      const budget = D.budgetInvestissement || 0;
      if (isChecked && target > 0 && dcaPct > 0) {
        const montant = Math.round(budget * (dcaPct/100) * (target/100) * 100) / 100;
        amountEl.textContent = eur(montant) + ' / mois';
        amountEl.style.display = 'inline';
      } else if (isChecked && (target <= 0 || !dcaPct)) {
        amountEl.textContent = '⚠ % objectif ou DCA manquant';
        amountEl.style.cssText = 'font-size:var(--text-sm);color:var(--amber);display:inline';
      } else {
        amountEl.style.display = 'none';
      }
    };
    document.getElementById('pos-auto-invest')?.addEventListener('change', updateAutoAmount);
    document.getElementById('pos-target')?.addEventListener('input', updateAutoAmount);
    document.getElementById('pos-section')?.addEventListener('change', updateAutoAmount);
    updateAutoAmount();

    document.getElementById("pos-cancel").addEventListener("click", close);

    if (isEdit) {
      document.getElementById("pos-delete").addEventListener("click", () => {
        confirmModal("Êtes-vous sûr de vouloir supprimer ?", "", () => {
          const arr = D[existingSection];
          const idx = arr.indexOf(existingPos);
          if (idx >= 0) arr.splice(idx, 1);
          saveData(); close(); if (onSaved) onSaved();
          toast("Actif supprimé");
        });
      });
    }

    document.getElementById("pos-save").addEventListener("click", () => {
      const section  = document.getElementById("pos-section").value;
      const account  = document.getElementById("pos-account").value;
      const name     = document.getElementById("pos-name").value.trim();
      const ticker   = document.getElementById("pos-ticker").value.trim();
      const qty      = parseFloat(document.getElementById("pos-qty").value)||0;
      const pru          = parseFloat(document.getElementById("pos-pru").value)||0;
      const pruCurrency  = document.getElementById("pos-pru-currency").value || "EUR";
      const category     = document.getElementById("pos-category").value || "";
      const targetRaw    = document.getElementById("pos-target").value;
      const target       = targetRaw !== "" ? parseFloat(targetRaw) : null;
      const autoInvest   = document.getElementById("pos-auto-invest")?.checked || false;
      const price        = parseFloat(document.getElementById("pos-price")?.value) || (d.price || 0);
      if (!name) { toast("Le nom est requis"); return; }
      const market = qty * price;
      // Convertir PRU en EUR si nécessaire pour le calcul du coût
      const pruEur = pruCurrency === "EUR" ? pru : pru * (fxRates[pruCurrency] || 1);
      const cost   = qty * pruEur;
      const pnl    = market - cost;
      const perf   = cost > 0 ? (market/cost - 1)*100 : 0;
      const allPos = D[section] || [];
      const totalMkt = allPos.reduce((s,p) => s+(p.market||0), 0) + (isEdit ? 0 : market);
      const entry = { account, name, ticker, category, target, autoInvest, qty, pru, pruCurrency, price, cost, market, pnl, perf, weight: totalMkt > 0 ? market/totalMkt*100 : 0 };
      if (isEdit) {
        const idx = D[existingSection].indexOf(existingPos);
        if (existingSection !== section) {
          D[existingSection].splice(idx, 1);
          if (!Array.isArray(D[section])) D[section] = [];
          D[section].push(entry);
        } else {
          D[existingSection][idx] = entry;
        }
      } else {
        if (!Array.isArray(D[section])) D[section] = [];
        D[section].push(entry);
      }
      // Recalc weights
      ["etfPositions","stockPositions","cryptoPositions"].forEach(sec => {
        const tot = (D[sec]||[]).reduce((s,p) => s+(p.market||0), 0);
        (D[sec]||[]).forEach(p => { p.weight = tot > 0 ? p.market/tot*100 : 0; });
      });
      saveData(); close(); if (onSaved) onSaved();
      toast(isEdit ? "Actif mis à jour ✓" : "Actif ajouté ✓");
    });
  }

  const tabs = document.createElement("div"); tabs.className = "tabs";
  const tabDefs = [
    { label:"ETF",     positions:D.etfPositions,    totals:{market:etfMkt, pnl:etfPnl, perf:(etfMkt/etfCost-1)*100}, section:"etfPositions" },
    { label:"Actions", positions:D.stockPositions,  totals:{market:stkMkt, pnl:stkPnl, perf:(stkMkt/stkCost-1)*100}, section:"stockPositions" },
    { label:"Crypto",  positions:D.cryptoPositions, totals:{market:cryMkt, pnl:cryPnl, perf:(cryMkt/cryCost-1)*100}, section:"cryptoPositions" },

  let activeTab = 0;
  const body = document.createElement("div"); body.className = "invest-table-wrap";

  const getInvestAccountColor = (name) => {
    const all = [...(D.liquiditesInvest||[]),...(D.cryptoAccounts||[]),...(D.compteCourants||[])];
    const acc = all.find(a => a.name === name);
    if (acc?.color) return acc.color;
    const bank = (D.banks||[]).find(b => b.name === acc?.bank);
    return bank?.color || "#888888";
  };

  const pillColorCache = {};
  const accountPill = (name) => {
    if (!name) return "font-size:var(--text-md);color:var(--text3)";
    if (!pillColorCache[name]) {
      const hex = getInvestAccountColor(name);
      pillColorCache[name] = `display:inline-block;padding:2px 8px;border-radius:20px;font-size:var(--text-md);font-weight:600;background:${hex}22;color:${hex};border:1px solid ${hex}66;white-space:nowrap`;
    }
    return pillColorCache[name];
  };

  // Container pour les 2 cards graphiques, côte à côte (colonne sur mobile)
  const chartsContainer = document.createElement("div");
  chartsContainer.style.cssText = "display:grid;grid-template-columns:2fr 1fr;gap:16px";
  const mqCharts = window.matchMedia("(max-width:600px)");
  const applyMqCharts = () => { chartsContainer.style.gridTemplateColumns = mqCharts.matches ? "1fr" : "2fr 1fr"; };
  applyMqCharts(); mqCharts.addEventListener("change", applyMqCharts);

  const renderTable = (idx) => {
    const { positions, section } = tabDefs[idx];
    // Recalculer les totaux depuis les données actuelles
    const livePositions = D[section] || [];
    const liveMkt  = sum(livePositions, "market");
    const livePnl  = sum(livePositions, "pnl");
    const liveCost = sum(livePositions, "cost");
    const secToDcaTfoot = { etfPositions:'dcaETF', stockPositions:'dcaActions', cryptoPositions:'dcaCrypto' };
    const dcaKeyFoot = secToDcaTfoot[section];
    const dcaPctFoot = dcaKeyFoot ? (D.virements[dcaKeyFoot] || 0) : 0;
    const budgetFoot = D.budgetInvestissement || 0;
    const totalTarget = livePositions.reduce((s,p) => s + (p.target != null && p.target !== "" ? parseFloat(p.target)||0 : 0), 0);
    const totalAutoInvest = livePositions.reduce((s,p) => {
      if (!p.autoInvest || !p.target || !dcaPctFoot) return s;
      return s + Math.round(budgetFoot * (dcaPctFoot/100) * (p.target/100) * 100) / 100;
    }, 0);
    const totals = { market: liveMkt, pnl: livePnl, perf: liveCost > 0 ? (liveMkt/liveCost-1)*100 : 0 };
    const accountSource = section === "cryptoPositions" ? (D.cryptoAccounts||[]) : (D.liquiditesInvest||[]);
    const accountOptions = accountSource.map(a => a.name);
    body.innerHTML = "";
    const table = document.createElement("table");
    table.className = "invest-table";
    table.innerHTML = `<thead><tr>
      <th>Compte</th><th>Nom</th>
      <th>Catégorie</th><th>Obj.</th><th style="white-space:nowrap">Inv. auto</th><th>Qté</th><th>PRU</th><th>Prix</th>
      <th style="white-space:nowrap">Valeur mkt</th><th>P&L</th><th>Perf.</th><th>Poids</th><th></th><th></th>
    </tr></thead>`;
    const tbody = document.createElement("tbody");
    livePositions.forEach((p, pi) => {
      const tr = document.createElement("tr");
      tr.dataset.section = section;
      tr.dataset.idx = pi;
      tr.innerHTML = `
        <td><span style="${accountPill(p.account)}">${p.account||"—"}</span></td>
        <td style="white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis">${p.name}</td>
        <td><span style="font-size:var(--text-md);color:var(--text);border:1px solid var(--border2);border-radius:20px;padding:1px 8px;white-space:nowrap">${p.category||"—"}</span></td>
        <td style="color:var(--text2);font-family:var(--font-mono)">${p.target != null && p.target !== "" ? p.target+"%" : "—"}</td>
        <td style="font-family:var(--font-mono);white-space:nowrap">${(() => {
          if (!p.autoInvest) return '<span style="color:var(--text3)">—</span>';
          const secToDca = { etfPositions:'dcaETF', stockPositions:'dcaActions', cryptoPositions:'dcaCrypto' };
          const dcaKey = secToDca[section];
          const dcaPct = dcaKey ? (D.virements[dcaKey] || 0) : 0;
          const budget = D.budgetInvestissement || 0;
          const t = p.target;
          if (!t || !dcaPct) return '<span style="color:var(--amber);font-size:var(--text-sm)">⚠ —</span>';
          const montant = Math.round(budget * (dcaPct/100) * (t/100) * 100) / 100;
          return '<span style="color:var(--amber)">' + eur(montant) + '</span>';
        })()}</td>
        <td>${(p.qty||0).toLocaleString("fr-FR",{maximumFractionDigits:4})}</td>

        <td data-live="price">${p._tickerError ? '<span style="background:var(--loss)20;color:var(--loss);border:1px solid #e0505044;border-radius:4px;font-size:var(--text-md);padding:1px 4px;margin-right:3px;font-family:var(--font-body)">⚠</span>' : ""}${eur(p.price||0)}</td>
        <td data-live="market" style="white-space:nowrap">${eur(p.market)}</td>
        <td data-live="pnl" class="${p.pnl>=0?'text-gain':'text-loss'}">${eur(p.pnl)}</td>
        <td data-live="perf"><span class="pnl-badge ${p.perf>=0?'up':'down'}">${pct(p.perf)}</span></td>
        <td data-live="weight">${p.weight.toFixed(1)}%</td>`;
      // Bouton achat
      const buyTd = document.createElement("td");
      const buyBtn = document.createElement("button"); buyBtn.className = "edit-btn"; buyBtn.title = "Acheter / Vendre";
      buyBtn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>`;
      buyBtn.addEventListener("click", e => {
        e.stopPropagation();
        document.querySelectorAll(".trade-menu").forEach(el => el.remove());
        const menu = document.createElement("div");
        menu.className = "trade-menu";
        menu.style.cssText = "position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:6px;min-width:140px;box-shadow:0 4px 16px #0005;display:flex;flex-direction:column;gap:2px";
        const mkItem = (label, icon, color, onClick) => {
          const btn = document.createElement("button");
          btn.style.cssText = `display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;border:none;background:transparent;cursor:pointer;width:100%;text-align:left;font-size:var(--text-md);color:${color};font-family:var(--font-body);transition:background .1s`;
          btn.innerHTML = `${icon}<span>${label}</span>`;
          btn.addEventListener("mouseenter", () => btn.style.background = "var(--surface2)");
          btn.addEventListener("mouseleave", () => btn.style.background = "transparent");
          btn.addEventListener("click", () => { menu.remove(); onClick(); });
          return btn;
        };
        menu.appendChild(mkItem("Acheter", `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>`, "var(--gain)", () => openBuyModal(p, section, () => { renderTable(activeTab); document.dispatchEvent(new Event("datachanged")); })));
        menu.appendChild(mkItem("Vendre", `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>`, "var(--loss)", () => openSellModal(p, section, () => { renderTable(activeTab); document.dispatchEvent(new Event("datachanged")); })));
        const rect = buyBtn.getBoundingClientRect();
        menu.style.top  = (rect.bottom + 4) + "px";
        menu.style.left = (rect.left - 80) + "px";
        document.body.appendChild(menu);
        const close = e => { if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener("click", close, true); } };
        setTimeout(() => document.addEventListener("click", close, true), 0);
      });
      buyTd.appendChild(buyBtn);
      tr.appendChild(buyTd);
      // Bouton édition
      const editTd = document.createElement("td");
      const editBtn = document.createElement("button"); editBtn.className = "edit-btn"; editBtn.title = "Modifier";
      editBtn.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;
      editBtn.addEventListener("click", () => openPositionModal(p, section, () => { renderTable(activeTab); document.dispatchEvent(new Event("datachanged")); refreshPrices(); }));
      editTd.appendChild(editBtn);
      tr.appendChild(editTd);
      tbody.appendChild(tr);
    });
    const tfoot = document.createElement("tfoot");
    tfoot.innerHTML = `<tr>
      <td colspan="3" style="text-align:left;letter-spacing:.05em;text-transform:uppercase;color:var(--amber)">Total</td>
      <td style="text-align:right;font-family:var(--font-mono);color:var(--text2)">${totalTarget > 0 ? totalTarget.toFixed(1)+"%" : "—"}</td>
      <td style="text-align:right;font-family:var(--font-mono);color:var(--amber)">${totalAutoInvest > 0 ? eur(totalAutoInvest) : "—"}</td>
      <td></td><td></td><td></td>
      <td data-live="total-market" style="color:var(--amber);text-align:right">${eur(totals.market)}</td>
      <td data-live="total-pnl" class="${totals.pnl>=0?'text-gain':'text-loss'}" style="text-align:right">${eur(totals.pnl)}</td>
      <td style="text-align:right"><span data-live="total-perf" class="pnl-badge ${totals.perf>=0?'up':'down'}">${pct(totals.perf)}</span></td>
      <td style="text-align:right">100%</td>
      <td></td><td></td>
    </tr>`;
    table.appendChild(tbody); table.appendChild(tfoot);
    body.appendChild(table);

    // ── Graphique répartition par catégorie ──────────────────────────────────
    const catKey = secToCatKey[section];
    const catDefs = (D.investCategories?.[catKey]||[]).map(c => typeof c === "string" ? {name:c,target:0} : c);
    if (catDefs.length > 0 && livePositions.length > 0) {
      // Agréger par catégorie : somme des poids réels et somme des objectifs par position
      const bycatVal = {}, bycatTarget = {};
      catDefs.forEach(c => { bycatVal[c.name] = 0; bycatTarget[c.name] = 0; });
      livePositions.forEach(p => {
        const k = p.category || "— Sans catégorie —";
        bycatVal[k] = (bycatVal[k] || 0) + (p.market || 0);
        bycatTarget[k] = (bycatTarget[k] || 0) + (p.target != null ? p.target : 0);
      });
      const total = Object.values(bycatVal).reduce((s,v) => s+v, 0);
      const entries = catDefs.map(c => ({ cat:c.name, val:bycatVal[c.name]||0, target:bycatTarget[c.name]||0 }));
      Object.keys(bycatVal).forEach(k => { if (!catDefs.find(c=>c.name===k) && (bycatVal[k]>0||bycatTarget[k]>0)) entries.push({cat:k,val:bycatVal[k]||0,target:bycatTarget[k]||0}); });
      const sortedEntries = entries.filter(e => e.val>0||e.target>0).sort((a,b)=>b.val-a.val);
      const maxPct = Math.max(...sortedEntries.map(e => Math.max(total>0?e.val/total*100:0, e.target)), 1);
      const hasTargets = sortedEntries.some(e => e.target > 0);

      chartsContainer.innerHTML = ""; // reset avant rebuild

      const chartWrap = document.createElement("div");
      chartWrap.style.cssText = "padding:0";

      sortedEntries.forEach(({ cat, val, target }) => {
        const realPct = total > 0 ? val/total*100 : 0;
        const realBarW = realPct/maxPct*100;
        const targBarW = target/maxPct*100;

        const rowWrap = document.createElement("div");
        rowWrap.style.cssText = "display:flex;align-items:center;gap:10px;margin-bottom:8px";

        const labelEl = document.createElement("span");
        labelEl.style.cssText = "font-size:var(--text-md);color:var(--text);width:130px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap";
        labelEl.textContent = cat;

        const barsCol = document.createElement("div");
        barsCol.style.cssText = "flex:1;min-width:0;display:flex;flex-direction:column;gap:3px";

        const realRow = document.createElement("div");
        realRow.style.cssText = "display:flex;align-items:center;gap:6px";
        const realBg = document.createElement("div");
        realBg.style.cssText = "flex:1;height:12px;background:var(--surface2);border-radius:6px;overflow:hidden";
        const realFill = document.createElement("div");
        realFill.style.cssText = `width:${realBarW}%;height:100%;background:var(--amber);border-radius:6px;transition:width .4s ease`;
        realBg.appendChild(realFill);
        const realLbl = document.createElement("span");
        realLbl.style.cssText = "font-family:var(--font-mono);font-size:var(--text-md);color:var(--amber);width:38px;flex-shrink:0;text-align:right";
        realLbl.textContent = realPct.toFixed(1)+"%";
        realRow.appendChild(realBg); realRow.appendChild(realLbl);
        barsCol.appendChild(realRow);

        if (target > 0) {
          const targRow = document.createElement("div");
          targRow.style.cssText = "display:flex;align-items:center;gap:6px";
          const targBg = document.createElement("div");

          const targFill = document.createElement("div");

          targLbl.style.cssText = "font-family:var(--font-mono);font-size:var(--text-md);color:var(--text3);width:38px;flex-shrink:0;text-align:right";

          barsCol.appendChild(targRow);
        }

        rowWrap.appendChild(labelEl); rowWrap.appendChild(barsCol);
        chartWrap.appendChild(rowWrap);
      });

      // ── Card donut (1/3) ────────────────────────────────────────────────
      const donutWrap = document.createElement("div");
      donutWrap.style.cssText = "padding:0";

      const R = 54, ri = 32, dcx = 70, dcy = 70;
      const validEntries = sortedEntries.filter(e => e.val > 0);
      let svgPaths = ""; let angle = -Math.PI/2;

      validEntries.forEach(({ cat, val }, i) => {
        const slice = total > 0 ? (val/total) * Math.PI * 2 : 0;
        if (slice === 0) return;
        const color = DONUT_COLORS[i % DONUT_COLORS.length];
        if (Math.abs(slice - Math.PI * 2) < 0.0001) {
          // Cas 100% : arc path impossible, on dessine deux cercles (anneau complet)
          svgPaths += `<circle cx="${dcx}" cy="${dcy}" r="${R}" fill="${color}" opacity="0.9"/><circle cx="${dcx}" cy="${dcy}" r="${ri}" fill="var(--surface)"/><title>${cat}: 100%</title>`;
          angle += slice;
          return;
        }
        const x1 = dcx + R*Math.cos(angle), y1 = dcy + R*Math.sin(angle);
        const x2 = dcx + R*Math.cos(angle+slice), y2 = dcy + R*Math.sin(angle+slice);
        const xi1 = dcx + ri*Math.cos(angle), yi1 = dcy + ri*Math.sin(angle);
        const xi2 = dcx + ri*Math.cos(angle+slice), yi2 = dcy + ri*Math.sin(angle+slice);
        const large = slice > Math.PI ? 1 : 0;
        svgPaths += `<path d="M${xi1},${yi1} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} L${xi2},${yi2} A${ri},${ri} 0 ${large},0 ${xi1},${yi1}" fill="${color}" opacity="0.9"><title>${cat}: ${(val/total*100).toFixed(1)}%</title></path>`;
        angle += slice;
      });

      const svgEl = document.createElement("div");
      svgEl.style.cssText = "display:flex;justify-content:center";
      svgEl.innerHTML = `<svg width="140" height="140" viewBox="0 0 140 140">${svgPaths}</svg>`;
      donutWrap.appendChild(svgEl);

      // Légende sous le donut
      const legend = document.createElement("div");
      legend.style.cssText = "margin-top:10px;display:flex;flex-direction:column;gap:4px";
      validEntries.forEach(({ cat, val }, i) => {
        const pct_ = total > 0 ? val/total*100 : 0;
        const color = DONUT_COLORS[i % DONUT_COLORS.length];
        const row = document.createElement("div");
        row.style.cssText = "display:flex;align-items:center;gap:6px";
        row.innerHTML = `<span style="width:8px;height:8px;border-radius:2px;background:${color};flex-shrink:0;display:inline-block"></span>
          <span style="font-size:var(--text-md);color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${cat}</span>
          <span style="font-family:var(--font-mono);font-size:var(--text-md);color:var(--text)">${pct_.toFixed(1)}%</span>`;
        legend.appendChild(row);
      });
      donutWrap.appendChild(legend);

      // Card barres horizontales
      const barsCard = document.createElement("div"); barsCard.className = "card";
      const barsHeader = document.createElement("div"); barsHeader.className = "card-title";
      barsHeader.style.cssText = "margin:-20px -20px 16px;border-bottom:1px solid var(--border)";
      barsHeader.appendChild(Object.assign(document.createElement("span"), {textContent:"Répartition par catégorie"}));

      if (hasTargets) {
        const leg = document.createElement("div"); leg.style.cssText = "display:flex;gap:14px;font-size:var(--text-md);color:var(--text)";
        leg.innerHTML = `<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:3px;background:var(--amber);display:inline-block"></span>Portefeuille</span><span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:3px;background:repeating-linear-gradient(45deg,var(--text3) 0px,var(--text3) 2px,transparent 2px,transparent 6px);opacity:0.7;display:inline-block"></span>Objectif</span>`;
        barsHeader.appendChild(leg);
      }
      barsCard.appendChild(barsHeader);
      barsCard.appendChild(chartWrap);
      chartsContainer.appendChild(barsCard);

      // Card donut
      const donutCard = document.createElement("div"); donutCard.className = "card";
      const donutHeader = document.createElement("div"); donutHeader.className = "card-title";
      donutHeader.style.cssText = "margin:-20px -20px 16px;border-bottom:1px solid var(--border)";
      donutHeader.appendChild(Object.assign(document.createElement("span"), {textContent:"Allocation du portefeuille"}));
      donutCard.appendChild(donutHeader);
      donutCard.appendChild(donutWrap);
      chartsContainer.appendChild(donutCard);
    } else {
      chartsContainer.innerHTML = "";
    }
  };

  tabDefs.forEach((t,i) => {
    const tab = document.createElement("button"); tab.className = "tab" + (i===0?" active":"");
    tab.textContent = t.label;
    tab.addEventListener("click", () => {
      activeTab = i;
      tabs.querySelectorAll(".tab").forEach((el,j) => el.classList.toggle("active", j===i));
      renderTable(i);
    });
    tabs.appendChild(tab);
  });
  renderTable(0);
  card.appendChild(tabs); card.appendChild(body);
  c.appendChild(card);
  c.appendChild(chartsContainer);
}

// ── Calculs crédit ──────────────────────────────────────────────────────────

function calcMensualite(capital, tauxAnnuel, dureeM) {
  if (tauxAnnuel === 0) return capital / dureeM;
  const tm = tauxAnnuel / 100 / 12;
  return capital * tm / (1 - Math.pow(1 + tm, -dureeM));
}

// ── Moteur CreditSim complet ───────────────────────────────────────────────
function buildAmortTable(loan) {
  const round2 = v => Math.round(v * 100) / 100;

  const loanAmount       = loan.loanAmount || 0;
  const rate             = loan.rate || 0;
  const duration         = loan.duration || 0;  // mois d'amortissement purs
  const startStr         = loan.startDate || "";
  const prefundingMonths = loan.prefundingMonths || 0;
  const prefundingFee    = loan.prefundingFee    || 0;
  const deferredMonths   = loan.deferredMonths   || 0;
  const deferredFee      = loan.deferredFee      || 0;
  const initialInsurance = loan.initialInsurance || 0;
  const hasContractual   = !!loan.contractualTotal;
  const contractualTotal = loan.contractualTotal || 0;
  const hasInsChange     = !!loan.insuranceChangeMo;
  const insuranceChangeMo= loan.insuranceChangeMo || null;
  const insuranceRate2   = loan.insuranceRate2   || 0;

  const r = rate / 100 / 12;
  const amortMonths = duration;

  // Capital post-différé
  const interetsMensuel = round2(loanAmount * r);
  const capitalPostDeferred = round2(loanAmount + interetsMensuel * deferredMonths);

  // Mensualité de base
  let mensualiteBase;
  if (r === 0) {
    mensualiteBase = capitalPostDeferred / amortMonths;
  } else {
    mensualiteBase = capitalPostDeferred * r * Math.pow(1+r, amortMonths) / (Math.pow(1+r, amortMonths) - 1);
  }

  // Taux assurance déduit
  const insuranceRate = capitalPostDeferred > 0 ? (initialInsurance / capitalPostDeferred) * 12 : 0;

  // Date helpers
  let [startYear, startMonth] = startStr ? startStr.split("-").map(Number) : [new Date().getFullYear(), new Date().getMonth() + 1];
  let curYear = startYear, curMonth = startMonth;
  const addMonth = () => { curMonth++; if (curMonth > 12) { curMonth = 1; curYear++; } };
  const fmtDate  = () => `${String(curMonth).padStart(2,"0")}/${curYear}`;
  const now = new Date();
  const isCurrentMonth = () => curYear === now.getFullYear() && curMonth === now.getMonth() + 1;

  const rows = [];

  // Phase préfinancement
  for (let m = 0; m < prefundingMonths; m++) {
    rows.push({ date: fmtDate(), phase: "prefunding", total: prefundingFee, capitalAmorti: 0, partInteret: 0, assurance: prefundingFee, capitalRestant: loanAmount, totalCapitalAmorti: 0, isCurrent: isCurrentMonth(), interetsCompens: 0 });
    addMonth();
  }

  // Phase différé
  let interetsCumul = 0;
  for (let m = 0; m < deferredMonths; m++) {
    interetsCumul += interetsMensuel;
    const isLast = m === deferredMonths - 1;
    rows.push({ date: fmtDate(), phase: "deferred", total: deferredFee, capitalAmorti: 0, partInteret: 0, assurance: deferredFee, capitalRestant: isLast ? capitalPostDeferred : loanAmount, totalCapitalAmorti: 0, isCurrent: isCurrentMonth(), interetsCompens: isLast ? 0 : round2(interetsCumul) });
    addMonth();
  }

  // Phase amortissement
  let capitalRestant = capitalPostDeferred;
  let totalCapitalAmorti = 0;
  const assuranceInitiale = initialInsurance;

  for (let m = 0; m < amortMonths; m++) {
    const mAmort = m + 1;
    const partInteret = round2(capitalRestant * r);
    let capitalAmorti, totalEcheance;

    // Assurance : taux original pour le calcul du capital, taux nouveau pour l'affichage
    const assuCalculee = round2(capitalRestant * (insuranceRate / 12));
    const assuAffichee = (hasInsChange && insuranceChangeMo && mAmort >= insuranceChangeMo)
      ? round2(capitalRestant * (insuranceRate2 / 100 / 12))
      : assuCalculee;

    capitalAmorti = hasContractual
      ? round2(contractualTotal - assuCalculee - partInteret)
      : round2(mensualiteBase - partInteret);
    totalEcheance = round2(capitalAmorti + partInteret + assuAffichee);
    const assurance = assuAffichee;

    capitalRestant = round2(Math.max(0, capitalRestant - capitalAmorti));
    totalCapitalAmorti = round2(totalCapitalAmorti + capitalAmorti);

    rows.push({ date: fmtDate(), phase: "amort", total: totalEcheance, capitalAmorti, partInteret, assurance, capitalRestant, totalCapitalAmorti, isCurrent: isCurrentMonth(), interetsCompens: 0 });
    addMonth();
  }

  const mensualite = mensualiteBase;
  return { rows, mensualite, capitalPostDeferred, insuranceRate, prefundingMonths, deferredMonths, amortMonths };
}

function loanKPIs(loan) {
  const { rows, mensualite, capitalPostDeferred, insuranceRate } = buildAmortTable(loan);

  // Trouver la ligne courante via isCurrent
  const currentIdx = rows.findIndex(r => r.isCurrent);
  const currentRow = currentIdx >= 0 ? currentIdx + 1 : rows.filter(r => r.phase === "amort" || r.phase === "deferred" || r.phase === "prefunding").length;

  // Capital amorti = totalCapitalAmorti de la ligne courante (phase amort seulement)
  const currentRowData = currentIdx >= 0 ? rows[currentIdx] : null;
  const capitalAmortiADate = currentRowData?.totalCapitalAmorti ?? 0;
  const capitalRestantADate = currentRowData?.capitalRestant ?? loan.loanAmount;
  const pct = loan.loanAmount > 0 ? (capitalAmortiADate / loan.loanAmount) * 100 : 0;

  const totalInteret = rows.reduce((s, r) => s + (r.partInteret || 0), 0);
  const totalAssurance = rows.reduce((s, r) => s + (r.assurance || 0), 0);
  const coutTotal = totalInteret + totalAssurance;

  // Mensualité actuelle (phase amort, ligne courante)
  const mensualiteActuelle = currentRowData?.phase === "amort" ? currentRowData.total : (mensualite || 0);

  const endDate = rows.length > 0 ? rows[rows.length - 1].date : "—";
  const bien = [...(D.immobilierBiens||[]), ...(D.investImmo||[])].find(b => b.id === loan.immobilierBienId);
  const prixRef = bien ? (bien.valeurAchat ?? bien.amount ?? 0) : (loan.purchasePrice || 0);
  const valeurNette = prixRef - capitalRestantADate;

  return {
    mensualite, mensualiteActuelle, mensualiteTotal: mensualiteActuelle,
    capitalAmortiADate, capitalRestantADate, pct,
    coutTotal, totalInteret, totalAssurance,
    endDate, valeurNette, currentRow, rows, capitalPostDeferred,
    amortMonths: rows.filter(r => r.phase === "amort").length,
  };
}

    lCalc.style.border = !isContractual ? "1px solid var(--border2)" : "";
    lCalc.querySelector("span").style.color = !isContractual ? "var(--amber)" : "var(--text2)";
    lContr.style.background = isContractual ? "var(--surface2)" : "";
    lContr.style.border = isContractual ? "1px solid var(--border2)" : "";
    lContr.querySelector("span").style.color = isContractual ? "var(--amber)" : "var(--text2)";
    cFields.style.display = isContractual ? "block" : "none";
  };
  document.querySelectorAll('input[name="cf-model"]').forEach(rb => rb.addEventListener("change", updateModelToggle));

  // ── Loan amount calc ──
  let _loanAmount = d.loanAmount || 0;
  const calcLoan = () => {
    const purchase  = parseFloat(document.getElementById("cf-purchase").value) || 0;
    const notary    = parseFloat(document.getElementById("cf-notary").value)   || 0;
    const guarantee = parseFloat(document.getElementById("cf-guarantee").value)|| 0;
    const dossier   = parseFloat(document.getElementById("cf-dossier").value)  || 0;
    const apport    = parseFloat(document.getElementById("cf-apport").value)   || 0;
    _loanAmount = purchase + notary + guarantee + dossier - apport;
    const el = document.getElementById("cf-loan-display");
    if (el) el.textContent = _loanAmount > 0 ? eur(_loanAmount) : "—";
  };
  ["cf-purchase","cf-notary","cf-guarantee","cf-dossier","cf-apport"].forEach(id => document.getElementById(id)?.addEventListener("input", calcLoan));

  if (isEdit && _loanAmount > 0) {
    const el = document.getElementById("cf-loan-display");
    if (el) el.textContent = eur(_loanAmount);
  } else { calcLoan(); }

  document.getElementById("cf-cancel").addEventListener("click", () => overlay.remove());
  overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });

  document.getElementById("cf-save").addEventListener("click", () => {
    const _pf = id => { const v = parseFloat(document.getElementById(id)?.value); return isNaN(v) ? 0 : v; };
    const _pi = id => { const v = parseInt(document.getElementById(id)?.value);   return isNaN(v) ? 0 : v; };

    const bienIdRaw = parseInt(document.getElementById("cf-bien")?.value) || null;
    const tousBiensLocal = [...(D.immobilierBiens||[]), ...(D.investImmo||[])];
    const bienSelectionne = bienIdRaw ? tousBiensLocal.find(b => b.id === bienIdRaw) : null;
    const immobilierBienId = bienSelectionne ? bienSelectionne.id : null;
    const name = bienSelectionne ? bienSelectionne.name : (existingLoan?.name || "Crédit");

    const isContractual = document.getElementById("cf-model-contractual").checked;
    const hasPrefunding = document.getElementById("cf-cb-prefunding").checked;
    const hasDeferred   = document.getElementById("cf-cb-deferred").checked;
    const hasInsChange  = document.getElementById("cf-cb-ins-change").checked;

    const loanAmount = _loanAmount;
    const duration   = _pi("cf-duration");

    if (loanAmount <= 0 || duration <= 0) { toast("Veuillez remplir tous les champs obligatoires"); return; }

    const loan = {
      id: isEdit ? existingLoan.id : (D.nextLoanId || Date.now()),
      name,
      startDate:         document.getElementById("cf-start").value,
      bank:              document.getElementById("cf-bank").value,
      purchasePrice:     _pf("cf-purchase"),
      notaryFees:        _pf("cf-notary"),
      guaranteeFees:     _pf("cf-guarantee"),
      dossierFees:       _pf("cf-dossier"),
      apport:            _pf("cf-apport"),
      loanAmount,
      rate:              _pf("cf-rate"),
      duration,
      // Phases optionnelles
      prefundingMonths:  hasPrefunding ? _pi("cf-prefunding-months") : 0,
      prefundingFee:     hasPrefunding ? _pf("cf-prefunding-fee")    : 0,
      deferredMonths:    hasDeferred   ? _pi("cf-deferred-months")   : 0,
      deferredFee:       hasDeferred   ? _pf("cf-deferred-fee")      : 0,
      // Assurance
      initialInsurance:  _pf("cf-initial-insurance"),
      insuranceRate:     0, // rétrocompat, calculé dynamiquement
      contractualTotal:  isContractual ? _pf("cf-contractual") : 0,
      insuranceChangeMo: hasInsChange  ? _pi("cf-insurance-change-month") : null,
      insuranceRate2:    hasInsChange  ? _pf("cf-insurance-rate2") : 0,
      immobilierBienId,
    };

    if (isEdit) {
      const idx = D.loans.findIndex(l => l.id === existingLoan.id);
      if (idx >= 0) D.loans[idx] = loan;
    } else {
      D.loans.push(loan);
      D.nextLoanId = (D.nextLoanId || Date.now()) + 1;
    }

    saveData(); overlay.remove(); render();
    toast(isEdit ? "Crédit mis à jour ✓" : "Crédit ajouté ✓");
  });
}

      const isOpen = toggle.classList.toggle("open");
      tableWrap.classList.toggle("open", isOpen);

      if (isOpen && !tableBuilt) {
        tableBuilt = true;

                const { rows } = kpi;

        const totalInteret  = rows.reduce((s,r) => s + (r.partInteret||0), 0);
        const totalAssur    = rows.reduce((s,r) => s + (r.assurance||0), 0);

        tableWrap.innerHTML = `
          <table class="amort-table">
            <thead>
              <tr>
                <th>Rang</th>
                <th>Date</th>
                <th>Mensualité</th>
                <th>Capital amorti</th>
                <th>Part intérêts</th>

    amortSection.appendChild(toggle);

// ─── ANALYSE DES DÉPENSES ─────────────────────────────────────────────────────

// Palette de couleurs pour les catégories
const CAT_COLORS = [
  "#f0a020","#f5c842","#e87830","#a0c878","#5898d8",
  "#c868a8","#78c8a0","#e87878","#8878d8","#78b8c8",
  "#d8a878","#88c850","#c89868","#a8a8a8",
];

function getCatColor(cat) {
  const idx = (D.analyseCats || []).indexOf(cat);
  return CAT_COLORS[idx >= 0 ? idx % CAT_COLORS.length : 0];
}

function getTypeColor(type) {
  const types = D.analyseTypes || [];
  const colors = ["#5898d8","#f0a020","#a0c878","#e87830","#c868a8","#e05050"];
  const idx = types.indexOf(type);
  return colors[idx >= 0 ? idx % colors.length : 0];
}

function analyse(c) {
  const deps = D.analyseDepenses || [];
  const total = deps.reduce((s,d) => s + d.montant, 0);

  // ── Filtre actif ─────────────────────────────────────────────────────────
  let filterCat  = null; // null = tous
  let filterType = null;
  let sortCol    = "montant"; // nom | montant | categorie | type
  let sortAsc    = false;

  // ── Calcul par type (nécessaire pour la suite) ───────────────────────────
  const byType = {};
  D.analyseTypes.forEach(t => byType[t] = 0);
  deps.forEach(d => { if (byType[d.type] !== undefined) byType[d.type] += d.montant; });

  // ── Grille 2 colonnes : catégorie | type ─────────────────────────────────
  const graphRow = document.createElement("div");

  // ── Helper : rendre les barres dans un body ───────────────────────────

    const body = document.createElement("div");
    body.className = "analyse-bars-body";
    entries.forEach(([label, montant]) => {
      const row = document.createElement("div"); row.className = "analyse-bar-row";
      const color = colorFn(label);
      row.innerHTML = `
        <div class="analyse-bar-label" title="${label}">${label}</div>
        <div class="analyse-bar-bg"><div class="analyse-bar-fg" style="width:${(montant/maxVal*100).toFixed(1)}%;background:${color}"></div></div>
        <div class="analyse-bar-val">${eur(montant)}</div>
        <div class="analyse-bar-pct">${total>0?(montant/total*100).toFixed(1):"0"}%</div>`;
      body.appendChild(row);
    });
    return body;
  };

  // ── Card catégories ───────────────────────────────────────────────────
  const catTotals = {};
  deps.forEach(d => { catTotals[d.categorie] = (catTotals[d.categorie] || 0) + d.montant; });

  tableHeader.innerHTML = `<span>Dépenses du mois</span>`;

  filterRow.appendChild(allChip);

  tableCard.appendChild(filterRow);

  // Modale ajout dépense
  const openDepModal = () => {
    const ov = document.createElement("div");
    ov.style.cssText = "position:fixed;inset:0;background:#00000088;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";

      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0;max-width:480px;width:100%;max-height:90vh;overflow-y:auto">
        <div class="card-title">Nouvelle dépense</div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px">
          <div class="form-group"><label>Nom</label><input class="form-input" id="dep-nom" placeholder="Ex: Supermarché"></div>
          <div class="form-group"><label>Montant (€)</label><input class="form-input" type="number" step="0.01" id="dep-montant" placeholder="0.00"></div>
          <div class="form-group"><label>Catégorie</label>
            <select class="dep-form-select" id="dep-cat">
              ${D.analyseCats.map(cat=>`<option>${cat}</option>`).join("")}
            </select>
          </div>
          <div class="form-group"><label>Type</label>
            <select class="dep-form-select" id="dep-type">

        </div>
        <div class="form-actions">
          <button class="app-btn app-btn--rect" id="dep-modal-cancel">Annuler</button>
          <button class="app-btn app-btn--rect app-btn--primary" id="dep-modal-save">Ajouter la dépense</button>
        </div>
        </div>

    ov.querySelector("#dep-modal-cancel").addEventListener("click", () => ov.remove());
    ov.querySelector("#dep-modal-save").addEventListener("click", () => {
      const nom = ov.querySelector("#dep-nom").value.trim();
      const montant = parseFloat(ov.querySelector("#dep-montant").value);
      const categorie = ov.querySelector("#dep-cat").value;
      const type = ov.querySelector("#dep-type").value;
      if (!nom || isNaN(montant) || montant <= 0) return toast("Nom et montant requis");
      D.analyseDepenses.push({ nom, montant, categorie, type });
      saveData();
      ov.remove();
      toast("Dépense ajoutée ✓");

    let filtered = D.analyseDepenses.filter(d =>

      (!filterType || d.type === filterType)

    // Sort
    filtered = [...filtered].sort((a,b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (typeof va === "string") return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortAsc ? va - vb : vb - va;
    });

    const sortIcon = (col) => sortCol === col
      ? (sortAsc ? `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="18 15 12 9 6 15"/></svg>`

    const table = document.createElement("table"); table.className = "dep-table";

    // ── Thead ──────────────────────────────────────────────────────────────
    const thead = document.createElement("thead");
    thead.innerHTML = `<tr>
      <th style="cursor:pointer" data-sort="nom">Nom ${sortIcon("nom")}</th>
      <th style="cursor:pointer" data-sort="montant">Montant ${sortIcon("montant")}</th>
      <th style="cursor:pointer" data-sort="categorie">Catégorie ${sortIcon("categorie")}</th>
      <th style="cursor:pointer" data-sort="type">Type ${sortIcon("type")}</th>
      <th></th>
    </tr>`;
    thead.querySelectorAll("th[data-sort]").forEach(th => {
      th.addEventListener("click", () => {
        const col = th.dataset.sort;
        if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = false; }
        renderTable();
      });
    });
    table.appendChild(thead);

    // ── Tbody avec édition inline ──────────────────────────────────────────
    const tbody = document.createElement("tbody");
    filtered.forEach(d => {
      const realIdx = D.analyseDepenses.indexOf(d);
      const tr = document.createElement("tr");

      // Nom
      const tdNom = document.createElement("td");
      const nomSpan = document.createElement("span");
      nomSpan.textContent = d.nom;
      nomSpan.title = d.nom;
      nomSpan.style.cssText = "cursor:pointer;padding:2px 4px;border-radius:4px;transition:background .12s;display:inline-block";
      nomSpan.addEventListener("mouseenter", () => { nomSpan.style.background = "var(--amber-dim)"; nomSpan.style.color = "var(--amber)"; });
      nomSpan.addEventListener("mouseleave", () => { nomSpan.style.background = ""; nomSpan.style.color = ""; });
      nomSpan.addEventListener("click", () => {
        nomSpan.style.background = ""; nomSpan.style.color = "";
        const inp = document.createElement("input"); inp.type = "text"; inp.value = d.nom;
        inp.style.cssText = inlineStyle + ";width:100%;box-sizing:border-box";
        nomSpan.textContent = ""; nomSpan.appendChild(inp); inp.focus(); inp.select();
        const commit = () => {
          const v = inp.value.trim();
          if (v) { D.analyseDepenses[realIdx].nom = v; saveData(); }
          renderTable();
        };
        inp.addEventListener("blur", commit);
        inp.addEventListener("keydown", e => { if (e.key === "Enter") inp.blur(); if (e.key === "Escape") renderTable(); });
      });
      tdNom.appendChild(nomSpan);

      // Montant
      const tdMt = document.createElement("td");
      const mtSpan = document.createElement("span");
      mtSpan.textContent = eur(d.montant);
      mtSpan.style.cssText = "cursor:pointer;padding:2px 4px;border-radius:4px;font-family:var(--font-mono);transition:background .12s;display:inline-block";
      mtSpan.addEventListener("mouseenter", () => { mtSpan.style.background = "var(--amber-dim)"; mtSpan.style.color = "var(--amber)"; });
      mtSpan.addEventListener("mouseleave", () => { mtSpan.style.background = ""; mtSpan.style.color = ""; });
      mtSpan.addEventListener("click", () => {
        mtSpan.style.background = ""; mtSpan.style.color = "";
        const inp = document.createElement("input"); inp.type = "number"; inp.step = "0.01"; inp.value = d.montant;
        inp.style.cssText = inlineStyle + ";font-family:var(--font-mono);width:80px;text-align:right";
        mtSpan.textContent = ""; mtSpan.appendChild(inp); inp.focus(); inp.select();
        const commit = () => {
          const v = parseFloat(inp.value);
          if (!isNaN(v) && v > 0) { D.analyseDepenses[realIdx].montant = v; saveData(); }
          renderTable();
        };
        inp.addEventListener("blur", commit);
        inp.addEventListener("keydown", e => { if (e.key === "Enter") inp.blur(); if (e.key === "Escape") renderTable(); });
      });
      tdMt.appendChild(mtSpan);

      // Catégorie
      const tdCat = document.createElement("td");
      const catBadge = document.createElement("span");
      catBadge.className = "dep-cat-badge";
      catBadge.style.cssText = `background:${getCatColor(d.categorie)}22;color:${getCatColor(d.categorie)};cursor:pointer`;
      catBadge.textContent = d.categorie;
      catBadge.addEventListener("click", () => {
        openOptionPicker(catBadge, d.categorie, D.analyseCats, getCatColor, val => {
          D.analyseDepenses[realIdx].categorie = val; saveData(); renderTable();
        });
      });
      tdCat.appendChild(catBadge);

      // Type
      const tdType = document.createElement("td");
      const typeBadge = document.createElement("span");
      typeBadge.className = "dep-cat-badge";
      typeBadge.style.cssText = `display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:var(--text-md);font-weight:600;white-space:nowrap;background:${getTypeColor(d.type)}22;color:${getTypeColor(d.type)};cursor:pointer`;
      typeBadge.textContent = d.type;
      typeBadge.addEventListener("click", () => {
        openOptionPicker(typeBadge, d.type, D.analyseTypes, getTypeColor, val => {
          D.analyseDepenses[realIdx].type = val; saveData(); renderTable();
        });
      });
      tdType.appendChild(typeBadge);

      // Supprimer
      const tdDel = document.createElement("td");
      const delBtn = document.createElement("button"); delBtn.className = "dep-inline-btn del"; delBtn.title = "Supprimer";
      delBtn.innerHTML = `<svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg>`;
      delBtn.addEventListener("click", () => {
        confirmModal("Êtes-vous sûr de vouloir supprimer ?", "Cette dépense sera supprimée.", () => {
          D.analyseDepenses.splice(realIdx, 1);
          saveData(); c.innerHTML = ""; analyse(c); toast("Dépense supprimée");
        });
      });
      tdDel.appendChild(delBtn);

      tr.appendChild(tdNom); tr.appendChild(tdMt); tr.appendChild(tdCat); tr.appendChild(tdType); tr.appendChild(tdDel);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);

    // ── Tfoot ──────────────────────────────────────────────────────────────
    const tfoot = document.createElement("tfoot");
    tfoot.innerHTML = `<tr><td>Total (${filtered.length})</td><td>${eur(filtTotal)}</td><td colspan="3"></td></tr>`;
    table.appendChild(tfoot);
    tableWrap.appendChild(table);
  };

  // Gestion des filtres chips
  const setFilter = (cat, type) => {
    filterCat = cat; filterType = type;
    allChip.classList.toggle("active", !cat && !type);
    Object.entries(catChips).forEach(([k,chip]) => chip.classList.toggle("active", k === cat));
    renderTable();
  };
  allChip.addEventListener("click", () => setFilter(null, null));
  Object.entries(catChips).forEach(([cat, chip]) => {
    chip.addEventListener("click", () => setFilter(filterCat === cat ? null : cat, null));
  });

  renderTable();
}



let fxRates = {};
let fxLoading = false;

async function fetchFxRates() {
  if (fxLoading) return;
  fxLoading = true;
  const statusEl = document.getElementById("fx-status");
  const pillsEl  = document.getElementById("fx-pills");
  if (statusEl) statusEl.textContent = "🔄 Mise à jour…";
  try {
    const res  = await fetch("https://open.er-api.com/v6/latest/EUR");
    const data = await res.json();
    if (data.result !== "success") throw new Error();
    const symbols = ["USD","GBP","CHF","CAD"];
    symbols.forEach(k => { if (data.rates[k]) fxRates[k] = 1 / data.rates[k]; });
    if (statusEl) statusEl.textContent = `✓ Mis à jour le ${new Date().toLocaleDateString("fr-FR")}`;
    if (pillsEl)  pillsEl.innerHTML = symbols
      .map(k => data.rates[k] ? `<span class="fx-pill">1 ${k} = ${(1/data.rates[k]).toFixed(4)} €</span>` : "")
      .join("");
  } catch {
    try {
      const res2  = await fetch("https://api.frankfurter.app/latest?base=EUR");
      const data2 = await res2.json();
      Object.keys(data2.rates).forEach(k => { fxRates[k] = 1 / data2.rates[k]; });
      if (statusEl) statusEl.textContent = `✓ Mis à jour (Frankfurter) le ${new Date().toLocaleDateString("fr-FR")}`;
      if (pillsEl)  pillsEl.innerHTML = ["USD","GBP","CHF","CAD"]
        .filter(k => data2.rates[k])
        .map(k => `<span class="fx-pill">1 ${k} = ${(1/data2.rates[k]).toFixed(4)} €</span>`)
        .join("");
    } catch {
      if (statusEl) statusEl.textContent = "⚠ Impossible de charger les taux (mode hors-ligne ?)";
    }
  }
  fxLoading = false;
}
