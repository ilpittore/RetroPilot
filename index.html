    document.getElementById("bank-modal-save").addEventListener("click", () => {
      const name = document.getElementById("bank-modal-name").value.trim();
      if (!name) { toast("Le nom est requis"); return; }
      if ((D.banks||[]).some(b => b.name === name)) { toast("Cette banque existe déjà"); return; }
      if (!D.banks) D.banks = [];
      D.banks.push({ name, color: selectedBankColor });
      D.banks.sort((a,b) => a.name.localeCompare(b.name));
      saveData(); close(); renderBanks(); toast("Banque ajoutée ✓");
    });
  };
  bankAddBtn.addEventListener("click", openBankModal);

  // ── 3. Taux de change ────────────────────────────────────────────────────
  const fxCard = document.createElement("div"); fxCard.className = "card";
  fxCard.style.animationDelay = ".12s";
  fxCard.innerHTML = `
    <div class="card-title" style="margin:-20px -20px 20px;border-bottom:1px solid var(--border)">
      🌍 Taux de change
    </div>
    <div class="fx-status" id="fx-status" style="margin-bottom:8px">Non chargés</div>
    <div class="fx-pills" id="fx-pills">—</div>`;
  c.appendChild(fxCard);
  fetchFxRates();

}

// ─── ANALYSE DES DÉPENSES ─────────────────────────────────────────────────────

// ═══════════════ main.js ═══════════════
// ═══════════════════════════════════════════════════════════════
// MAIN — Point d'entrée, navigation, init
// Chargé en dernier, après tous les modules
// ═══════════════════════════════════════════════════════════════

// render() défini ici car il référence toutes les fonctions de pages
// qui ne sont disponibles qu'une fois tous les scripts chargés
// ═══════════════ avancement.js ═══════════════

// Icônes élégantes style Feather (stroke, pas de fill) — mêmes conventions que le menu
const LOCK_ICON      = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
const HOURGLASS_ICON = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px"><path d="M5 3h14"/><path d="M19 3v4l-7 5 7 5v4"/><path d="M5 21v-4l7-5-7-5V3"/><path d="M5 21h14"/></svg>`;
const CHECK_ICON     = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" style="vertical-align:middle;margin-right:4px"><polyline points="20 6 9 17 4 12"/></svg>`;

function avancement(c) {
  const v           = D.virements;
  const matelasActuel = livretComputeSoldes()['matelas'] || 0;
  const essentiel   = computeBudget().essentiel;
  const montantVert = D.budgetInvestissement || 0;

  // ── Helpers SVG nœuds ────────────────────────────────────────────────
  const nodeCheck     = () => `<svg width="44" height="44" viewBox="0 0 44 44" fill="none"><circle cx="22" cy="22" r="21" fill="#34c77b18" stroke="var(--gain)" stroke-width="1.5"/><polyline points="13,22 20,29 31,15" fill="none" stroke="var(--gain)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const nodeHourglass = () => `<svg width="44" height="44" viewBox="0 0 44 44" fill="none"><circle cx="22" cy="22" r="21" fill="var(--amber-dim)" stroke="var(--amber)" stroke-width="1.5"/><g transform="translate(22,22)"><line x1="-6" y1="-10" x2="6" y2="-10" stroke="var(--amber)" stroke-width="1.8" stroke-linecap="round"/><line x1="-6" y1="10" x2="6" y2="10" stroke="var(--amber)" stroke-width="1.8" stroke-linecap="round"/><path d="M-6,-10 L6,-10 L0,0 L6,10 L-6,10 L0,0 Z" fill="none" stroke="var(--amber)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></g></svg>`;
  const nodeLock      = () => `<svg width="44" height="44" viewBox="0 0 44 44" fill="none"><circle cx="22" cy="22" r="21" fill="var(--surface)" stroke="var(--border2)" stroke-width="1.5" opacity="0.5"/><rect x="15" y="21" width="14" height="10" rx="2" fill="none" stroke="var(--border2)" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/><path d="M17 21v-3a5 5 0 0 1 10 0v3" fill="none" stroke="var(--border2)" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/></svg>`;

  // ── Card Progression (construite une seule fois) ──────────────────────
  const progWrap = document.createElement('div');
  c.appendChild(progWrap);
  const cp = document.createElement('div');
  cp.className = 'card';
  cp.innerHTML = `
    <div class="card-title"><span>Votre parcours investisseur</span></div>
    <div class="av-progress-wrap">
      <div style="display:flex;align-items:flex-start;padding:8px 0 4px">
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">
          <div id="av-node1"></div>
          <div style="text-align:center;font-size:var(--text-md)"><div style="color:var(--amber);text-transform:uppercase;letter-spacing:.05em">Étape 1</div><div style="color:var(--text);line-height:1.4;margin-top:2px">Rembourser ses mauvaises dettes</div></div>
        </div>
        <div style="flex:2;height:3px;border-radius:4px;margin-top:22px" id="av-line1"></div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">
          <div id="av-node2"></div>
          <div style="text-align:center;font-size:var(--text-md)"><div style="color:var(--amber);text-transform:uppercase;letter-spacing:.05em">Étape 2</div><div style="color:var(--text);line-height:1.4;margin-top:2px">Mettre en place un matelas de sécurité</div></div>
        </div>
        <div style="flex:2;height:3px;border-radius:4px;margin-top:22px" id="av-line2"></div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:8px">
          <div id="av-node3"></div>
          <div style="text-align:center;font-size:var(--text-md)"><div style="color:var(--amber);text-transform:uppercase;letter-spacing:.05em">Étape 3</div><div style="color:var(--text);line-height:1.4;margin-top:2px">Mettre en place ses investissements</div></div>
        </div>
      </div>
    </div>`;
  progWrap.appendChild(cp);

  // Met à jour nœuds et traits sans recréer la card
  function updateProg(s1ok, s2ok) {
    const el = id => document.getElementById(id);
    if (!el('av-node1')) return;
    el('av-node1').innerHTML = s1ok ? nodeCheck() : nodeHourglass();
    el('av-node2').innerHTML = !s1ok ? nodeLock() : s2ok ? nodeCheck() : nodeHourglass();
    el('av-node3').innerHTML = !s2ok ? nodeLock() : nodeHourglass();
    el('av-line1').style.background = s1ok ? 'var(--amber)' : 'var(--border2)';
    el('av-line1').style.opacity    = s1ok ? '1' : '0.3';
    el('av-line2').style.background = s2ok ? 'var(--amber)' : 'var(--border2)';
    el('av-line2').style.opacity    = s2ok ? '1' : '0.3';
  }

  // ── Grille des 3 cards ───────────────────────────────────────────────
  const grid = document.createElement('div');
  grid.className = 'av-steps-grid';
  c.appendChild(grid);

  // Construit une card header/body/footer (flex-column)
  // state: 'locked' | 'active' | 'done'
  const STATE_COLOR = { locked: '#888888', active: '#f0a020', done: '#34c77b' };
  function applyCardState(card, head, foot, state) {
    const col = STATE_COLOR[state];
    card.style.background  = col + '12';
    card.style.borderColor = col + '44';
    card.style.pointerEvents = state === 'locked' ? 'none' : 'auto';
    head.style.borderBottomColor = col + '30';
    foot.style.borderTopColor    = col + '30';
  }
  function buildStepCard(state, delay, animate) {
    const col  = STATE_COLOR[state];
    const anim = animate ? `animation:fadeUp .35s ${delay} ease both;` : '';
    const card = document.createElement('div');
    card.style.cssText = `${anim}border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;background:${col}12;border:1px solid ${col}44`;
    const head = document.createElement('div');
    head.style.cssText = `padding:12px 16px;border-bottom:1px solid ${col}30;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0`;
    const body = document.createElement('div');
    body.style.cssText = 'padding:14px 16px;font-size:var(--text-md);color:var(--text2);flex:1';
    const foot = document.createElement('div');
    foot.style.cssText = `padding:10px 16px;border-top:1px solid ${col}30;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-shrink:0`;
    if (state === 'locked') card.style.pointerEvents = 'none';
    card.appendChild(head); card.appendChild(body); card.appendChild(foot);
    return { card, head, body, foot };
  }

  // Helpers inline réutilisables
  const TIT  = (col) => `font-family:var(--font-head);font-size:var(--text-lg);font-weight:600;color:${col}`;
  const HINT = (col) => `font-size:var(--text-md);font-weight:600;color:${col};display:inline-flex;align-items:center;gap:3px`;
  const MONO = (col) => `font-family:var(--font-mono);font-size:var(--text-lg);font-weight:600;color:${col}`;

  // ── Applique l'état CSS complet de la card 3 ─────────────────────────
  function applyCard3State(unlocked, totPct, totOk) {
    const c3 = document.getElementById('av-card3');
    if (!c3) return;
    const state = !unlocked ? 'locked' : 'active';
    const col   = STATE_COLOR[state];
    const tc    = unlocked ? 'var(--text)' : 'var(--text3)';
    c3.style.background    = col + '12';
    c3.style.borderColor   = col + '44';
    c3.style.pointerEvents = unlocked ? 'auto' : 'none';
    const h3 = document.getElementById('av-head3');
    if (h3) {
      h3.style.borderBottomColor = col + '30';
      const sp = h3.querySelectorAll('span');
      if (sp[0]) sp[0].style.color = tc;
      if (sp[1]) {
        sp[1].style.color = unlocked ? 'var(--amber)' : 'var(--text3)';
        sp[1].innerHTML = unlocked ? HOURGLASS_ICON+'En cours' : LOCK_ICON+'Verrouillée';
      }
    }
    const f3 = document.getElementById('av-foot3');
    if (f3) {
      f3.style.borderTopColor = col + '30';
      const lbl = f3.querySelector('span:first-child');
      if (lbl) lbl.style.color = tc;
    }
    const f3p = document.getElementById('av-foot3-pct');
    const f3e = document.getElementById('av-foot3-eur');
    const pctCol = !unlocked ? 'var(--text3)' : totOk ? 'var(--gain)' : 'var(--loss)';
    if (f3p) { f3p.textContent = unlocked ? (Math.round((totPct||0)*10)/10)+'%' : '0%'; f3p.style.color = pctCol; }
    if (f3e) { f3e.textContent = eur(unlocked ? montantVert : 0); f3e.style.color = !unlocked ? 'var(--text3)' : totOk ? 'var(--amber)' : 'var(--loss)'; }
    c3.querySelectorAll('.dca-label,.dca-pct-unit,.dca-stepper-btn').forEach(el => el.style.color = unlocked ? 'var(--text)' : 'var(--text3)');
    c3.querySelectorAll('.dca-amount').forEach(el => { if (!unlocked) { el.style.color = 'var(--text3)'; } else { const v = parseFloat(el.textContent.replace(/[^0-9.,]/g,'').replace(',','.')); el.style.color = v > 0 ? (totOk ? 'var(--text)' : 'var(--loss)') : 'var(--text3)'; } });
    c3.querySelectorAll('.dca-pct-input').forEach(i => { i.disabled = !unlocked; i.style.color = unlocked?'var(--text)':'var(--text3)'; i.style.borderColor = unlocked?'':'var(--border)'; });
    c3.querySelectorAll('.dca-bar').forEach(b => b.style.background = unlocked ? 'var(--amber)' : 'var(--border2)');
  }

  function buildGrid(animate = true) {
    const hsDettes = v.hasDettes || false;
    const moisMat  = v.moisMatelas || 6;
    const cible    = essentiel * moisMat;
    const pct      = cible > 0 ? Math.min(100, matelasActuel / cible * 100) : 0;
    const s1ok     = !hsDettes;
    const s2ok     = s1ok && matelasActuel >= cible;
    const dcaL     = ['dcaETF','dcaActions','dcaCrypto']
                       .map(k => ({ key:k, label:{dcaETF:'ETF',dcaActions:'Actions',dcaCrypto:'Cryptomonnaies'}[k], val:v[k]||0 }));
    const totPct   = dcaL.reduce((s,l) => s+l.val, 0);
    const totOk    = Math.abs(totPct-100) < 0.5;

    updateProg(s1ok, s2ok);
    grid.innerHTML = '';

    // ── Card 1 — Dettes ───────────────────────────────────────────────
    {
      const state1 = s1ok ? 'done' : 'active';
      const col1   = STATE_COLOR[state1];
      const { card, head, body, foot } = buildStepCard(state1, '0s', animate);
      head.innerHTML = `<span style="${TIT('var(--text)')}">Étape 1 — Dettes</span><span style="${HINT(s1ok?'var(--gain)':'var(--amber)')}">${s1ok?CHECK_ICON+'Validée':HOURGLASS_ICON+'En cours'}</span>`;
      body.innerHTML = `<label style="display:flex;align-items:center;gap:10px;cursor:pointer">
        <span style="width:16px;height:16px;border-radius:4px;border:2px solid ${col1};background:var(--bg);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer" id="av-check-box">
          ${hsDettes?`<svg width="10" height="10" viewBox="0 0 10 10" fill="none"><polyline points="1.5,5 4,7.5 8.5,2" stroke="${col1}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
        </span>
        <input type="checkbox" id="av-has-dettes" ${hsDettes?'checked':''} style="display:none">
        <div><div style="color:var(--text)">J'ai des mauvaises dettes <span style="color:var(--text2)">— Crédits conso, découverts chroniques…</span></div></div>
      </label>`;
      foot.innerHTML = `<span style="${TIT('var(--text)')}">Budget remboursement / mois</span><span style="${MONO(s1ok?'var(--gain)':hsDettes?'var(--amber)':'var(--text3)')}">${eur(hsDettes?montantVert:0)}</span>`;
      grid.appendChild(card);
      // Checkbox custom : clic sur le label déclenche le vrai input caché
      body.querySelector('label').addEventListener('click', e => {
        const cb = card.querySelector('#av-has-dettes');
        cb.checked = !cb.checked;
        v.hasDettes = cb.checked; saveData(); buildGrid(false);
      });
    }

    // ── Card 2 — Matelas ──────────────────────────────────────────────
    {
      const state2 = !s1ok ? 'locked' : s2ok ? 'done' : 'active';
      const { card, head, body, foot } = buildStepCard(state2, '.06s', animate);
      card.id = 'av-card2'; head.id = 'av-head2'; foot.id = 'av-foot2';
      const locked2 = state2 === 'locked';
      const tc2  = locked2 ? 'var(--text3)' : 'var(--text)';
      const hc2  = state2 === 'done' ? 'var(--gain)' : locked2 ? 'var(--text3)' : 'var(--amber)';
      const valC = locked2 ? 'var(--text3)' : s2ok ? 'var(--gain)' : 'var(--amber)';
      const actC = locked2 ? 'var(--text3)' : s2ok ? 'var(--gain)' : 'var(--text)';
      const pctC = locked2 ? 'var(--text3)' : pct>=100 ? 'var(--gain)' : 'var(--amber)';
      head.innerHTML = `<span id="av-head2-title" style="${TIT(tc2)}">Étape 2 — Matelas</span><span id="av-head2-hint" style="${HINT(hc2)}">${locked2?LOCK_ICON+'Verrouillée':s2ok?CHECK_ICON+'Validée':HOURGLASS_ICON+'En cours'}</span>`;
      const pctBar  = cible > 0 ? Math.min(100, matelasActuel / cible * 100) : 0;
      const CIRC = 314;
      const dashFill = locked2 ? 0 : (pctBar / 100 * CIRC).toFixed(1);
      const donutCol  = locked2 ? '#9a9080' : s2ok ? '#34c77b' : '#f0a020';
      body.innerHTML = `
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <span style="color:${locked2?'var(--text3)':'var(--text)'}">Objectif</span>
          <span id="av-mois-val" style="font-family:var(--font-mono);font-size:var(--text-md);color:${valC}">${moisMat} mois</span>
        </div>
        <input type="range" id="av-mois-slider" class="av-slider" min="1" max="12" value="${moisMat}" ${locked2?'disabled':''} style="${locked2?'opacity:.35':''}">
        <div style="display:flex;justify-content:space-between;color:${locked2?'var(--text3)':'var(--text)'};font-size:var(--text-md);margin-top:3px;margin-bottom:8px"><span>1 mois</span><span>12 mois</span></div>
        <svg id="av-donut-svg" viewBox="0 0 400 150" width="100%" style="display:block">
          <path d="M100,130 A100,100 0 0,1 300,130" fill="none" stroke="${donutCol}22" stroke-width="20" stroke-linecap="round"/>
          <path id="av-donut-arc" d="M100,130 A100,100 0 0,1 300,130" fill="none" stroke="${donutCol}" stroke-width="20" stroke-linecap="round"
            stroke-dasharray="${dashFill} ${CIRC}" style="transition:stroke-dasharray .4s ease,stroke .3s ease"/>
          <text id="av-donut-pct" x="200" y="115" text-anchor="middle" dominant-baseline="central"
            style="font-family:var(--font-mono);font-size:16px;font-weight:600;fill:${donutCol}">${locked2?'0%':Math.round(pctBar)+'%'}</text>
        </svg>
        <div id="av-donut-sub" style="text-align:center;font-size:var(--text-md);color:${locked2?'var(--text3)':'var(--text)'};margin-top:10px;margin-bottom:4px">${locked2?'—':eur(matelasActuel)+' / '+eur(cible)}</div>`;
      card.querySelector('#av-mois-slider').style.setProperty('--slider-color', donutCol);
      // Ajuster font-size du % dans le SVG selon le scale réel
      requestAnimationFrame(() => {
        const svg = card.querySelector('#av-donut-svg');
        if (!svg) return;
        const scaleX = svg.getBoundingClientRect().width / 400;
        const textLg = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--text-lg')) || 16;
        const svgFs = Math.round(textLg / scaleX);
        const pctEl = card.querySelector('#av-donut-pct');
        if (pctEl) pctEl.style.fontSize = svgFs + 'px';
      });
      foot.innerHTML = `<span id="av-foot2-label" style="${TIT(tc2)}">Matelas de sécurité</span><span id="av-foot2-val" style="${MONO(valC)}">${locked2?'0 €':eur(matelasActuel)}</span>`;
      grid.appendChild(card);

      // input : mise à jour texte + couleurs card 2 en temps réel
      card.querySelector('#av-mois-slider').addEventListener('input', e => {
        const val     = parseInt(e.target.value);
        const newC    = essentiel * val;
        const newPct  = newC > 0 ? Math.min(100, matelasActuel/newC*100) : 0;
        const newS2ok = matelasActuel >= newC;
        const newState2 = newS2ok ? 'done' : 'active';
        const vc      = newS2ok ? 'var(--gain)' : 'var(--amber)';
        const pc      = newPct>=100 ? 'var(--gain)' : 'var(--amber)';
        const el = id => document.getElementById(id);
        // Textes + donut
        const CIRC2 = 314;
        const newCol = newS2ok ? '#34c77b' : '#f0a020';
        const newDash = (Math.min(100, newPct) / 100 * CIRC2).toFixed(1);
        el('av-mois-val').textContent  = val+' mois'; el('av-mois-val').style.color = vc;
        el('av-mois-slider').style.setProperty('--slider-color', newCol);
        el('av-donut-arc').setAttribute('stroke-dasharray', newDash+' '+CIRC2);
        el('av-donut-arc').setAttribute('stroke', newCol);
        el('av-donut-pct').textContent = Math.round(newPct)+'%'; el('av-donut-pct').style.fill = newCol;
        el('av-donut-sub').textContent = eur(matelasActuel)+' / '+eur(newC); el('av-donut-sub').style.color = 'var(--text)';
        el('av-foot2-val').textContent = eur(matelasActuel); el('av-foot2-val').style.color = newS2ok ? 'var(--gain)' : 'var(--amber)';
        el('av-head2-hint').style.color   = newS2ok ? 'var(--gain)' : 'var(--amber)';
        el('av-head2-hint').innerHTML     = newS2ok ? CHECK_ICON+'Validée' : HOURGLASS_ICON+'En cours';
        // Couleurs fond/bordure card 2
        applyCardState(card, head, foot, newState2);
        // Card 3 + graphique
        applyCard3State(newS2ok, totPct, totOk);
        updateProg(s1ok, newS2ok);
      });
      // change : sauvegarde + rebuild complet → couleurs card 2 mises à jour proprement
      card.querySelector('#av-mois-slider').addEventListener('change', e => {
        v.moisMatelas = parseInt(e.target.value); saveData(); buildGrid(false);
      });
    }

    // ── Card 3 — DCA (toujours construite active, état via applyCard3State) ──
    {
      const { card, head, body, foot } = buildStepCard('active', '.12s', animate);
      card.id = 'av-card3'; head.id = 'av-head3'; foot.id = 'av-foot3';
      head.innerHTML = `<span style="${TIT('var(--text)')}">Étape 3 — Investissements</span><span style="${HINT('var(--amber)')}">${HOURGLASS_ICON}En cours</span>`;
      body.innerHTML = "";
      dcaL.forEach(l => {
        const m = montantVert*l.val/100;
        const row = document.createElement("div"); row.className = "dca-row";

        const label = document.createElement("span"); label.className = "dca-label"; label.textContent = l.label;
        const barWrap = document.createElement("div"); barWrap.className = "dca-bar-wrap";
        const bar = document.createElement("div"); bar.className = "dca-bar"; bar.style.width = Math.min(l.val,100)+"%";
        barWrap.appendChild(bar);

        const inputWrap = document.createElement("div");
        inputWrap.style.cssText = "display:flex;align-items:center;border:1px solid var(--border2);border-radius:6px;overflow:hidden;background:var(--bg)";
        const inp = document.createElement("input");
        inp.type = "number"; inp.className = "dca-pct-input"; inp.dataset.key = l.key;
        inp.value = l.val; inp.min = 0; inp.max = 100;
        inp.style.cssText = "width:38px;text-align:right;border:none;border-radius:0;-moz-appearance:textfield;appearance:textfield;background:var(--bg);padding:2px 4px;font-size:var(--text-md);color:var(--text)";
        const btnWrap = document.createElement("div");
        btnWrap.style.cssText = "display:flex;flex-direction:column;border-left:1px solid var(--border2)";
        const btnUp = document.createElement("button");
        btnUp.className = "dca-stepper-btn";
        btnUp.textContent = "▲";
        const btnDown = document.createElement("button");
        btnDown.className = "dca-stepper-btn";
        btnDown.textContent = "▼";
        btnWrap.appendChild(btnUp); btnWrap.appendChild(btnDown);
        inputWrap.appendChild(inp); inputWrap.appendChild(btnWrap);

        const unit = document.createElement("span"); unit.className = "dca-pct-unit"; unit.textContent = "%";
        const amtSpan = document.createElement("span");
        amtSpan.className = "dca-amount";
        amtSpan.style.cssText = `font-family:var(--font-mono);font-size:var(--text-md);color:${l.val>0 ? (totOk?'var(--text)':'var(--loss)') : 'var(--text3)'};width:68px;text-align:right;flex-shrink:0`;
        amtSpan.textContent = eur(m);

        row.appendChild(label); row.appendChild(barWrap); row.appendChild(inputWrap); row.appendChild(unit); row.appendChild(amtSpan);
        body.appendChild(row);

        const update = (val) => {
          val = Math.max(0, Math.min(100, val));
          inp.value = val; v[l.key] = val; saveData(); buildGrid(false);
        };
        inp.addEventListener("change", () => update(parseFloat(inp.value)||0));
        btnUp.addEventListener("click", () => update((parseFloat(inp.value)||0) + 1));
        btnDown.addEventListener("click", () => update((parseFloat(inp.value)||0) - 1));
      });
      const tc = totOk ? 'var(--gain)' : 'var(--loss)';
      foot.innerHTML = `<span style="${TIT('var(--text)')}">Répartition DCA — <span id="av-foot3-pct" style="color:${tc}">${Math.round(totPct*10)/10}%</span>${!totOk?' ⚠':''}</span><span id="av-foot3-eur" style="${MONO('var(--amber)')}">${eur(montantVert)}</span>`;
      grid.appendChild(card);
      applyCard3State(s2ok, totPct, totOk);
    }
  }

  buildGrid();
}

function render() {
  const c = document.getElementById("content");
  c.innerHTML = "";
  const pages = { dashboard, patrimoine, budget, livret, avancement, virements, investissements, credits, analyse, parametres };
  if (pages[currentPage]) pages[currentPage](c);
  if (D.lastUpdated) document.getElementById("sidebar-footer").textContent = "Dernière MAJ : " + D.lastUpdated;
}

// Navigation par clic sur la sidebar
document.querySelectorAll(".nav-item[data-page]").forEach(el => {
  el.addEventListener("click", () => navigate(el.dataset.page));
});

// ── Init ──────────────────────────────────────────────────────────────────
// Restore thème sauvegardé
(function() {
  const t = localStorage.getItem("retropilot_theme") || "dark";
  document.documentElement.setAttribute("data-theme", t);
})();
navigate(currentPage);

// Taux de change au démarrage — re-render Patrimoine si déjà affiché
fetchFxRates().then(() => {
  if (currentPage === "patrimoine") render();
  refreshPrices(false);
});

if (D.lastUpdated) {
  document.getElementById("sidebar-footer").textContent = "Dernière MAJ : " + D.lastUpdated;
}
window.addEventListener("resize", () => {
  if (currentPage === "dashboard") render();
});
</script>
</body>
</html>
