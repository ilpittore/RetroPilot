function budget(c) {

  // ── Couleurs ──────────────────────────────────────────────────────────────
  const COLOR_ESS = "#e87830"; // orange  — essentielles → var(--color-ess)
  const COLOR_ENV = "#c868a8"; // violet  — envies/projets → var(--color-env)
  const COLOR_INV = "#34c77b"; // vert    — investissements → var(--color-inv)

  // ── Textes descriptifs ────────────────────────────────────────────────────
  const DESC_ESS = `La colonne orange est réservée pour les dépenses essentielles.<br>
  Si vous répondez OUI à au moins une de ces questions, alors il y a de fortes chances que la dépense soit à mettre dans cette colonne :<br>
  - Y a-t-il des conséquences si je ne paye pas cette facture ? (contrat, crédit…)<br>
  - Si demain je perdais mon emploi et que je n'avais plus de revenus, devrais-je maintenir obligatoirement cette dépense ?`;

  const DESC_ENV = `La colonne violette est réservée aux dépenses plaisirs et aux projets personnels à court terme. <br>
  Si vous répondez OUI à au moins une de ces questions, alors il y a de fortes chances que la dépense soit à mettre dans cette colonne : <br>
  - Si demain je perdais mon emploi et que je n'avais plus de revenus, est-ce que je pourrais supprimer cette dépense pour améliorer mes fins de mois ?`;

  const DESC_INV = `La colonne verte est réservée aux investissements.<br>
  C'est ici que vous allez déterminer quel montant allouer :<br>
  - Dans un 1er temps à l'élaboration de votre matelas de sécurité<br>
  - Dans un 2ème temps à vos investissements`;

  // ── Comptes courants (depuis Patrimoine) ──────────────────────────────────
  const comptes = (D.compteCourants || []).filter(cc => cc.name).map(cc => ({ name: cc.name, color: cc.color || "#888" }));
  const getAccountColor = (name) => comptes.find(c => c.name === name)?.color || "#888";

  // ── Camembert SVG ─────────────────────────────────────────────────────────
  function drawPie(svgId, segments) {
    const el = document.getElementById(svgId);
    if (!el) return;
    const total = segments.reduce((s, x) => s + Math.max(0, x.value), 0);
    if (total === 0) { el.innerHTML = `<circle cx="80" cy="80" r="65" fill="var(--surface2)"/>`; return; }

    const cx = 80, cy = 80, r = 62, ri = 32;
    let angle = -Math.PI / 2;
    let paths = "";
    const labelData = [];

    segments.forEach(seg => {
      const v = Math.max(0, seg.value);
      if (v === 0) return;
      const slice = (v / total) * Math.PI * 2;
      const midAngle = angle + slice / 2;
      const x1 = cx + r * Math.cos(angle), y1 = cy + r * Math.sin(angle);
      const x2 = cx + r * Math.cos(angle + slice), y2 = cy + r * Math.sin(angle + slice);
      const xi1 = cx + ri * Math.cos(angle), yi1 = cy + ri * Math.sin(angle);
      const xi2 = cx + ri * Math.cos(angle + slice), yi2 = cy + ri * Math.sin(angle + slice);
      const large = slice > Math.PI ? 1 : 0;
      paths += `<path d="M${xi1} ${yi1} L${x1} ${y1} A${r} ${r} 0 ${large} 1 ${x2} ${y2} L${xi2} ${yi2} A${ri} ${ri} 0 ${large} 0 ${xi1} ${yi1}" fill="${seg.color}" opacity="0.93"/>`;
      const lr = (r + ri) / 2;
      labelData.push({ x: cx + lr * Math.cos(midAngle), y: cy + lr * Math.sin(midAngle), pct: (v / total * 100).toFixed(0), slice });
      angle += slice;
    });

    // Cibles théoriques — arc extérieur bien visible
    const targets = [{ v: 0.50, c: COLOR_ESS }, { v: 0.30, c: COLOR_ENV }, { v: 0.20, c: COLOR_INV }];
    let ta = -Math.PI / 2;
    targets.forEach(t => {
      const slice = t.v * Math.PI * 2;
      const rr = 72;
      const x1 = cx + rr * Math.cos(ta), y1 = cy + rr * Math.sin(ta);
      const x2 = cx + rr * Math.cos(ta + slice), y2 = cy + rr * Math.sin(ta + slice);
      const large = slice > Math.PI ? 1 : 0;
      paths += `<path d="M${x1} ${y1} A${rr} ${rr} 0 ${large} 1 ${x2} ${y2}" fill="none" stroke="${t.c}" stroke-width="4" stroke-dasharray="6 3" opacity="0.75"/>`;
      ta += slice;
    });

    paths += `<circle cx="${cx}" cy="${cy}" r="${ri}" fill="var(--surface)"/>`;

    // Labels % sur les secteurs
    labelData.forEach(l => {
      if (l.slice > 0.2) {
        paths += `<text x="${l.x.toFixed(1)}" y="${l.y.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="700" fill="var(--text)" opacity="0.95">${l.pct}%</text>`;
      }
    });

    el.innerHTML = paths;
  }

  // ── Modale d'ajout de dépense ─────────────────────────────────────────────
  function openAddModal(opts, onSaved) {
    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;inset:0;background:#00000088;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";

    const freq    = opts.defaultFreq || "mensuel";
    const isAnnuel = freq === "annuel";
    const freqLabel = isAnnuel ? "Annuelle" : "Mensuelle";
    const amtLabel  = isAnnuel ? "Montant annuel (€ / an)" : "Montant (€ / mois)";

    overlay.innerHTML = `
      <div style="background:var(--surface);border:1px solid ${opts.color}45;border-radius:var(--radius);padding:0;width:100%;max-width:440px;animation:fadeUp .2s ease">
        <div class="card-title">
          <span style="display:flex;align-items:center;gap:8px">
            <span style="width:10px;height:10px;border-radius:50%;background:${opts.color};display:inline-block;flex-shrink:0"></span>
            Ajouter — ${opts.title}
          </span>
          <span style="padding:2px 8px;border-radius:20px;background:${opts.color}15;color:${opts.color};border:1px solid ${opts.color}45;font-size:var(--text-md)">${freqLabel}</span>
        </div>
        <div style="padding:6px 20px 20px">
        <div class="form-group" style="margin-bottom:12px">
          <label>Libellé</label>
          <input class="form-input" id="modal-lbl" placeholder="Ex: Loyer, EDF, Netflix…">
        </div>
        ${!isAnnuel ? `<div class="form-group" style="margin-bottom:12px">
          <label>Compte associé</label>
          <div id="modal-acc-wrapper"></div>
        </div>` : ""}
        <div class="form-group" style="margin-bottom:20px">
          <label>${amtLabel}</label>
          <input class="form-input" type="number" step="0.01" id="modal-amt" placeholder="0.00"
            style="font-family:var(--font-mono)">
        </div>
        <div class="form-actions">
          <button class="app-btn app-btn--rect" id="modal-cancel">Annuler</button>
          <button class="app-btn app-btn--rect app-btn--primary" id="modal-save"
            style="background:${opts.color};border-color:${opts.color};color:var(--text)">Valider</button>
        </div>
        </div>
      </div>`;

    document.body.appendChild(overlay);

    // Custom account picker button in modal
    let selectedAcc = comptes[0]?.name || "";
    if (!isAnnuel && comptes.length) {
      const wrapper = document.getElementById("modal-acc-wrapper");
      const renderAccBtn = () => {
        wrapper.innerHTML = "";
        const acct = comptes.find(c => c.name === selectedAcc);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "dep-form-select";
        btn.style.cssText = "display:flex;align-items:center;gap:8px;text-align:left;width:100%;cursor:pointer";
        if (acct) {
          btn.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${acct.color};flex-shrink:0;display:inline-block"></span><span style="flex:1">${acct.name}</span><span style="color:var(--text3)">▾</span>`;
        } else {
          btn.innerHTML = `<span style="flex:1;color:var(--text3)">— choisir</span><span style="color:var(--text3)">▾</span>`;
        }
        btn.addEventListener("click", e => {
          e.stopPropagation();
          openAccountPicker(btn, selectedAcc, comptes, name => { selectedAcc = name; renderAccBtn(); });
        });
        wrapper.appendChild(btn);
      };
      renderAccBtn();
    } else if (!isAnnuel) {
      const wrapper = document.getElementById("modal-acc-wrapper");
      if (wrapper) wrapper.innerHTML = `<span style="color:var(--text3)">— Aucun compte défini dans Patrimoine —</span>`;
    }

    setTimeout(() => document.getElementById("modal-lbl")?.focus(), 50);

    overlay.addEventListener("keydown", e => {
      if (e.key === "Enter" && !["BUTTON","SELECT"].includes(e.target.tagName))
        document.getElementById("modal-save")?.click();
    });
    overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
    document.getElementById("modal-cancel").addEventListener("click", () => overlay.remove());
    document.getElementById("modal-save").addEventListener("click", () => {
      const lbl = document.getElementById("modal-lbl").value.trim();
      const amt = parseFloat(document.getElementById("modal-amt").value);
      const acc = isAnnuel ? "" : selectedAcc;
      if (!lbl)                    return toast("Le libellé est requis");
      if (isNaN(amt) || amt === 0) return toast("Le montant est requis");
      if (isAnnuel) D[opts.dataKeyAnnuel].push({ label: lbl, account: acc, amount: amt });
      else          D[opts.dataKeyMensu].push({  label: lbl, account: acc, amount: amt });
      saveData();
      overlay.remove();
      onSaved();
      toast("Dépense ajoutée ✓");
    });
  }

  // ── Calcul total d'une colonne ────────────────────────────────────────────
  function computeColTotal(opts) {
    const m = (D[opts.dataKeyMensu]  || []).reduce((s, x) => s + x.amount, 0);
    const a = (D[opts.dataKeyAnnuel] || []).reduce((s, x) => s + x.amount, 0) / 12;
    return m + a;
  }

  // ── Modale d'édition d'une dépense budget ─────────────────────────────────
  function openBudgetItemModal(item, i, dataKey, isAnnuel, opts, refreshCard) {
    const color = opts.color;
    const amtLabel = isAnnuel ? "Montant annuel (€ / an)" : "Montant (€ / mois)";

    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;inset:0;background:#00000088;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";
    overlay.innerHTML = `
      <div style="background:var(--surface);border:1px solid ${color}45;border-radius:var(--radius);padding:0;width:100%;max-width:440px;animation:fadeUp .2s ease">
        <div class="card-title">
          <span style="display:flex;align-items:center;gap:8px">
            <span style="width:10px;height:10px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0"></span>
            Modifier — ${opts.title}
          </span>
        </div>
        <div style="padding:6px 20px 20px">
        <div class="form-group" style="margin-bottom:12px">
          <label>Libellé</label>
          <input class="form-input" id="bedit-lbl" value="${item.label}">
        </div>
        ${!isAnnuel ? `<div class="form-group" style="margin-bottom:12px">
          <label>Compte associé</label>
          <div id="bedit-acc-wrapper"></div>
        </div>` : ""}
        <div class="form-group" style="margin-bottom:20px">
          <label>${amtLabel}</label>
          <input class="form-input" type="number" step="0.01" id="bedit-amt" value="${item.amount}"
            style="font-family:var(--font-mono)">
        </div>
        <div class="form-actions">
          <button class="app-btn app-btn--rect" id="bedit-delete" style="background:var(--loss);border-color:var(--loss);color:var(--text);margin-right:auto">Supprimer</button>
          <button class="app-btn app-btn--rect" id="bedit-cancel">Annuler</button>
          <button class="app-btn app-btn--rect app-btn--primary" id="bedit-save" style="background:${color};border-color:${color};color:var(--text)">Enregistrer</button>
        </div>
        </div>
      </div>`;

    document.body.appendChild(overlay);

    // Compte picker
    let selectedAcc = item.account || (comptes[0]?.name || "");
    if (!isAnnuel && comptes.length) {
      const wrapper = document.getElementById("bedit-acc-wrapper");
      const renderAccBtn = () => {
        wrapper.innerHTML = "";
        const acct = comptes.find(c => c.name === selectedAcc);
        const btn = document.createElement("button");
        btn.type = "button"; btn.className = "dep-form-select";
        btn.style.cssText = "display:flex;align-items:center;gap:8px;text-align:left;width:100%;cursor:pointer;border-radius:var(--radius);height:var(--input-h);box-sizing:border-box;padding:0 10px";
        if (acct) {
          btn.innerHTML = `<span style="width:10px;height:10px;border-radius:50%;background:${acct.color};flex-shrink:0;display:inline-block"></span><span style="flex:1">${acct.name}</span><span style="color:var(--text3)">▾</span>`;
        } else {
          btn.innerHTML = `<span style="flex:1;color:var(--text3)">— choisir</span><span style="color:var(--text3)">▾</span>`;
        }
        btn.addEventListener("click", e => {
          e.stopPropagation();
          openAccountPicker(btn, selectedAcc, comptes, name => { selectedAcc = name; renderAccBtn(); });
        });
        wrapper.appendChild(btn);
      };
      renderAccBtn();
    }

    setTimeout(() => document.getElementById("bedit-lbl")?.focus(), 50);

    const close = () => overlay.remove();
    overlay.addEventListener("click", e => { if (e.target === overlay) close(); });
    overlay.addEventListener("keydown", e => {
      if (e.key === "Escape") close();
      if (e.key === "Enter" && !["BUTTON","SELECT"].includes(e.target.tagName)) document.getElementById("bedit-save")?.click();
    });
    document.getElementById("bedit-cancel").addEventListener("click", close);

    document.getElementById("bedit-delete").addEventListener("click", () => {
      close();
      confirmModal("Êtes-vous sûr de vouloir supprimer ?", "Cette action est irréversible.", () => {
        D[dataKey].splice(i, 1);
        saveData(); refreshCard(); refreshAnalysis();
        toast("Dépense supprimée");
      });
    });

    document.getElementById("bedit-save").addEventListener("click", () => {
      const lbl = document.getElementById("bedit-lbl").value.trim();
      const amt = parseFloat(document.getElementById("bedit-amt").value);
      if (!lbl) return toast("Le libellé est requis");
      if (isNaN(amt) || amt === 0) return toast("Le montant est requis");
      D[dataKey][i] = { ...D[dataKey][i], label: lbl, amount: amt, account: isAnnuel ? (item.account || "") : selectedAcc };
      saveData(); close(); refreshCard(); refreshAnalysis();
      toast("Dépense modifiée ✓");
    });
  }

  // ── Construire une ligne de dépense ───────────────────────────────────────
  function buildItemRow(item, i, dataKey, isAnnuel, refreshCard, opts) {
    const row = document.createElement("div"); row.className = "budget-item-row";

    // ── Bouton engrenage ───────────────────────────────────────────────────
    const gear = document.createElement("button"); gear.className = "edit-btn";
    gear.title = "Modifier";
    gear.innerHTML = `<svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;
    gear.addEventListener("click", () => openBudgetItemModal(item, i, dataKey, isAnnuel, opts || { color: "var(--amber)", title: "Dépense" }, refreshCard));

    // ── Libellé ────────────────────────────────────────────────────────────
    const nameEl = document.createElement("span"); nameEl.className = "budget-item-name";
    nameEl.textContent = item.label; nameEl.title = item.label;

    // ── Dot compte ────────────────────────────────────────────────────────
    const accEl = document.createElement("span");
    accEl.style.cssText = "flex-shrink:0;display:inline-flex;align-items:center;justify-content:center";
    const color = item.account ? getAccountColor(item.account) : null;
    const dot = document.createElement("span");
    if (color) {
      dot.style.cssText = `width:12px;height:12px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block`;
      dot.title = item.account;
    } else {
      dot.style.cssText = "width:12px;height:12px;border-radius:50%;border:1.5px dashed var(--border2);flex-shrink:0;display:inline-block";
      dot.title = "Aucun compte";
    }
    accEl.appendChild(dot);

    // ── Montant ────────────────────────────────────────────────────────────
    const amtEl = document.createElement("span"); amtEl.className = "budget-item-amount";
    amtEl.textContent = isAnnuel ? eur(item.amount) + "/an" : eur(item.amount);

    // ── Assemblage ─────────────────────────────────────────────────────────
    if (isAnnuel) {
      row.appendChild(nameEl); row.appendChild(amtEl); row.appendChild(gear);
    } else {
      row.appendChild(accEl); row.appendChild(nameEl); row.appendChild(amtEl); row.appendChild(gear);
    }

    return row;
  }

  // ── Construire une card (Essentielles ou Envies) ──────────────────────────
  function buildCard(opts) {
    const card = document.createElement("div");
    card.style.cssText = `background:${opts.color}15;border:1px solid ${opts.color}45;--card-border:${opts.color}45;--card-text:${opts.color};border-radius:var(--radius);overflow:hidden;animation:fadeUp .35s ${opts.delay} ease both`;

    // Header
    const header = document.createElement("div");
    header.className = "card-title";
    header.style.cssText = `padding:12px 16px;border-bottom:1px solid ${opts.color}45;margin-bottom:0`;
    header.innerHTML = `
      <span style="display:flex;align-items:center;gap:7px"><span style="width:9px;height:9px;border-radius:50%;background:${opts.color};flex-shrink:0"></span><span style="font-family:var(--font-head);font-weight:600;font-size:var(--text-lg);color:var(--text)">${opts.title} — Cible ${opts.target}</span></span>
      <div style="font-family:var(--font-mono);font-size:var(--text-lg);font-weight:600;color:${opts.color}" id="total-${opts.id}">
        ${eur(computeColTotal(opts))} / mois
      </div>`;
    card.appendChild(header);

    // Body
    const body = document.createElement("div");
    card.appendChild(body);

    const refreshCard = () => {
      body.innerHTML = "";
      const dataMensu = D[opts.dataKeyMensu] || [];
      const dataAnn   = D[opts.dataKeyAnnuel] || [];

      if (dataMensu.length > 0) {
        const lbl = document.createElement("div"); lbl.className = "budget-section-label"; lbl.textContent = "Mensuel";
        body.appendChild(lbl);
        const listM = document.createElement("div");
        dataMensu.map((item, i) => ({ item, i }))
          .sort((a, b) => (a.item.account || "").localeCompare(b.item.account || ""))
          .forEach(({ item, i }) => listM.appendChild(buildItemRow(item, i, opts.dataKeyMensu, false, refreshCard, opts)));
        body.appendChild(listM);
        const st = document.createElement("div"); st.className = "card-title";
        st.style.cssText = `padding:10px 16px;border-top:1px solid ${opts.color}45;border-bottom:none;margin-bottom:0`;
        st.innerHTML = `<span>Sous-total mensuel</span><span style="font-family:var(--font-mono);color:${opts.color}">${eur(dataMensu.reduce((s,x)=>s+x.amount,0))}</span>`;
        body.appendChild(st);
      }

      if (dataAnn.length > 0) {
        const lbl = document.createElement("div"); lbl.className = "budget-section-label"; lbl.textContent = "Annuel (÷12)";
        body.appendChild(lbl);
        const listA = document.createElement("div");
        dataAnn.map((item, i) => ({ item, i }))
          .sort((a, b) => (a.item.account || "").localeCompare(b.item.account || ""))
          .forEach(({ item, i }) => listA.appendChild(buildItemRow(item, i, opts.dataKeyAnnuel, true, refreshCard, opts)));
        body.appendChild(listA);
        const st = document.createElement("div"); st.className = "card-title";
        st.style.cssText = `padding:10px 16px;border-top:1px solid ${opts.color}45;border-bottom:none;margin-bottom:0`;
        st.innerHTML = `<span>Sous-total mensuel</span><span style="font-family:var(--font-mono);color:${opts.color}">${eur(dataAnn.reduce((s,x)=>s+x.amount,0)/12)}</span>`;
        body.appendChild(st);
      }

      const addBtn = document.createElement("button"); addBtn.className = "app-btn app-btn--rect";
      addBtn.style.cssText = `border-style:dashed;border-color:${opts.color}45;width:calc(100% - 32px);justify-content:center;margin:10px 16px 14px;font-size:var(--text-md)`;
      addBtn.innerHTML = `<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Ajouter une dépense`;
      addBtn.addEventListener("click", () => openAddModal(opts, () => { refreshCard(); refreshAnalysis(); }));
      body.appendChild(addBtn);

      // Màj total header
      const totalEl = document.getElementById(`total-${opts.id}`);
      if (totalEl) totalEl.textContent = eur(computeColTotal(opts)) + " / mois";
    };

    refreshCard();
    return { el: card, refresh: refreshCard };
  }

    h3.innerHTML = `<span style="display:flex;align-items:center;gap:7px"><span style="width:9px;height:9px;border-radius:50%;background:${opts.color};flex-shrink:0"></span><span style="font-family:var(--font-head);font-weight:600;font-size:var(--text-lg);color:var(--text)">Dépenses annuelles</span></span>`;

  // Grille 3 colonnes
  const colGrid = document.createElement("div"); colGrid.className = "budget-cols";

  // Col 1 — Essentielles

// ─── LIVRET ───────────────────────────────────────────────────────────────────
// Méthode des enveloppes : Matelas · Économies · Factures · Projets
// Chaque enveloppe est un "compte virtuel" à l'intérieur du livret réel

// ── Helpers ──────────────────────────────────────────────────────────────────

function livretComputeSoldes() {
  // Recalcule les soldes de chaque enveloppe à partir des mouvements
  const soldes = {};
  D.livretEnveloppes.forEach(e => soldes[e.id] = 0);

  D.livretMouvements.forEach(mvt => {
    D.livretEnveloppes.forEach(e => {
      const add = mvt[e.id + "_add"] || 0;
      const ret = mvt[e.id + "_ret"] || 0;
      soldes[e.id] += add - ret;
    });
  });

  return soldes;
}

function livretTotalLivret() {
  const soldes = livretComputeSoldes();
  return Object.values(soldes).reduce((s, v) => s + v, 0);
}

// ── Rendu principal ───────────────────────────────────────────────────────────

function livret(c) {
  c.innerHTML = ""; // Nettoyage avant chaque rendu (évite les doublons)

  const soldes = livretComputeSoldes();

  // ── Grille des 4 enveloppes ───────────────────────────────────────────────
  const envGrid = document.createElement("div");
  envGrid.className = "env-grid";

  D.livretEnveloppes.forEach((env, i) => {
    const solde  = soldes[env.id] || 0;
    const isNeg  = solde < 0;
    const color  = isNeg ? "#e05050" : env.color;

    const card = document.createElement("div");
    card.style.cssText = `background:${color}15;border:1px solid ${color}45;--card-border:${color}45;--card-text:${color};border-radius:var(--radius);overflow:hidden;animation:fadeUp .35s ${i * 0.07}s ease both`;

    // Header — même structure que les budget cards
    const header = document.createElement("div");
    header.className = "card-title";
    header.style.cssText = `padding:12px 16px;border-bottom:1px solid ${color}45;margin-bottom:0`;

    const titleRow = document.createElement("div");
    titleRow.style.cssText = "display:flex;align-items:center;gap:7px";
    titleRow.innerHTML = `
      <span style="font-family:var(--font-head);font-weight:600;font-size:var(--text-lg);color:var(--text)">${env.name}</span>
      ${isNeg ? `<span style="color:var(--loss);font-size:var(--text-md);line-height:1;margin-left:2px">⚠</span>` : ""}`;

    // Select association livret (style pillule)
    const livretOptions = (D.livrets || []).map(l => l.name);
    const currentAssoc = (D.livretAssociations || {})[env.id] || "";
    const headerRight = document.createElement("div");
    headerRight.style.cssText = "display:flex;align-items:center;gap:6px";

    if (livretOptions.length === 0) {
      const noLivret = document.createElement("span");
      noLivret.style.cssText = `font-family:var(--font-body);font-size:var(--text-md);color:${color};opacity:0.6;font-style:italic`;
      noLivret.textContent = "Aucun livret";
      headerRight.appendChild(noLivret);
    } else {
      const assocSel = document.createElement("select");
      assocSel.className = "livret-pill";
      assocSel.title = "Livret associé";
      livretOptions.forEach(name => {
        const opt = document.createElement("option"); opt.value = name; opt.textContent = name;
        if (name === currentAssoc) opt.selected = true;
        assocSel.appendChild(opt);
      });
      // Si aucune valeur sélectionnée, forcer la première option
      if (!currentAssoc && livretOptions.length > 0) {
        if (!D.livretAssociations) D.livretAssociations = {};
        D.livretAssociations[env.id] = livretOptions[0];
        assocSel.value = livretOptions[0];
        saveData();
      }
      assocSel.addEventListener("change", e => {
        if (!D.livretAssociations) D.livretAssociations = {};
        D.livretAssociations[env.id] = e.target.value || null;
        saveData();
      });
      headerRight.appendChild(assocSel);
    }
    const infoBtn = document.createElement("button");
    infoBtn.className = "app-btn app-btn--round";
    infoBtn.title = env.desc || "Info";
    infoBtn.textContent = "?";
    
    infoBtn.addEventListener("click", () => {
      const overlay = document.createElement("div");
      overlay.style.cssText = "position:fixed;inset:0;background:#00000088;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";
      overlay.innerHTML = `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0;max-width:360px;width:100%">
          <div class="card-title">
            <span style="display:flex;align-items:center;gap:8px">
              <span style="width:10px;height:10px;border-radius:50%;background:${env.color};display:inline-block;flex-shrink:0"></span>
              ${env.name}
            </span>
          </div>
          <div style="padding:6px 20px 20px">
          <p style="font-family:var(--font-body);font-size:var(--text-md);color:var(--text);line-height:1.6">${env.desc || "—"}</p>
          <div style="margin-top:20px;text-align:right">
            <button class="app-btn app-btn--rect" id="env-info-close">Fermer</button>
          </div>
          </div>
        </div>`;
      document.body.appendChild(overlay);
      overlay.addEventListener("click", e => { if (e.target === overlay) overlay.remove(); });
      overlay.querySelector("#env-info-close").addEventListener("click", () => overlay.remove());
    });
    headerRight.appendChild(infoBtn);

    header.appendChild(titleRow);
    header.appendChild(headerRight);
    card.appendChild(header);

    // Montant — même style que budget cards (font-mono 18px, padding identique)
    const soldeEl = document.createElement("div");
    soldeEl.style.cssText = `font-family:var(--font-mono);font-size:var(--text-lg);font-weight:600;color:${color};padding:10px 16px 12px`;
    soldeEl.textContent = eur(solde);

  const tableCard = document.createElement("div");
  tableCard.className = "card";

  const totalEnveloppes = livretTotalLivret();
  const totalLivretsReels = sum(D.livrets || [], "amount");
  const ecart = Math.abs(totalLivretsReels - totalEnveloppes);
  const hasEcart = ecart > 0.01;

        Ajouter un mouvement
      </button>
    </span>`;
  tableCard.appendChild(tableTitle);

  if (hasEcart) {
    setTimeout(() => {
      document.getElementById("ecart-badge")?.addEventListener("click", () => {

            <div style="display:flex;justify-content:space-between">

// ── Modale ajout de mouvement ─────────────────────────────────────────────────
function livretOpenMvtModal(c) {
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed;inset:0;background:#00000088;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";

  const modal = document.createElement("div");
  modal.style.cssText = "background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:0;width:100%;max-width:580px;max-height:90vh;overflow-y:auto";
  modal.innerHTML = `
    <div class="card-title">
      Nouveau mouvement
    </div>
    <div style="padding:6px 20px 20px">
    <div style="display:grid;grid-template-columns:1fr 2fr;gap:10px;margin-bottom:14px">
      <div class="form-group">
        <label>Date</label>
        <input class="form-input" type="date" id="mvt-date" style="color-scheme:dark" value="${new Date().toISOString().slice(0,10)}">
      </div>
      <div class="form-group">
        <label>Libellé</label>
        <input class="form-input" id="mvt-label" placeholder="Ex: Virements du mois">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">
      ${D.livretEnveloppes.map(env => `
        <div style="border:1px solid ${env.color}45;border-radius:8px;padding:12px;background:${env.color}10">
          <div style="font-family:var(--font-body);font-size:var(--text-md);color:${env.color};margin-bottom:10px;display:flex;align-items:center;gap:6px">
            <span style="width:8px;height:8px;border-radius:50%;background:${env.color};display:inline-block;flex-shrink:0"></span>
            ${env.name}
          </div>
          <div class="form-group" style="margin:0">
            <label style="font-family:var(--font-body);font-size:var(--text-md);color:var(--text)">Montant (€) [+/-]</label>
            <input class="form-input" type="number" step="0.01" id="mvt-${env.id}" placeholder="0">
          </div>
        </div>`).join("")}
    </div>
    <label style="display:flex;align-items:center;gap:10px;cursor:pointer;margin-bottom:14px">
      <input type="checkbox" id="mvt-update-livret" style="accent-color:var(--amber);width:15px;height:15px;flex-shrink:0">
      <span style="font-size:var(--text-md);color:var(--text)">Mettre à jour les comptes dans Patrimoine</span>
    </label>
    <div class="form-actions">
      <button class="app-btn app-btn--rect" id="mvt-cancel">Annuler</button>
      <button class="app-btn app-btn--rect app-btn--primary" id="mvt-save">Enregistrer</button>
    </div>
    </div>`;

  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  overlay.addEventListener("click", e => { if (e.target === overlay) close(); });
  modal.querySelector("#mvt-cancel").addEventListener("click", close);

  modal.querySelector("#mvt-save").addEventListener("click", () => {
    const date  = modal.querySelector("#mvt-date").value;
    const label = modal.querySelector("#mvt-label").value.trim();
    if (!label) return toast("Libellé requis");

    const mvt = { date, label };
    let hasValue = false;
    D.livretEnveloppes.forEach(env => {
      const val = parseFloat(modal.querySelector(`#mvt-${env.id}`).value) || 0;
      if (val > 0) { mvt[env.id + "_add"] = val;  hasValue = true; }
      if (val < 0) { mvt[env.id + "_ret"] = -val; hasValue = true; }
    });
    if (!hasValue) return toast("Saisir au moins un montant");

    D.livretMouvements.push(mvt);
    D.livretMouvements.sort((a, b) => a.date.localeCompare(b.date));

    // Mettre à jour les livrets associés si case cochée
    if (modal.querySelector("#mvt-update-livret")?.checked) {
      D.livretEnveloppes.forEach(env => {
        const val = parseFloat(modal.querySelector("#mvt-" + env.id)?.value) || 0;
        if (val === 0) return;
        const livretName = (D.livretAssociations || {})[env.id];
        if (!livretName) return;
        const liv = (D.livrets || []).find(l => l.name === livretName);
        if (liv) liv.amount = Math.round(((liv.amount || 0) + val) * 100) / 100;
      });
      document.dispatchEvent(new Event("datachanged"));
    }

    saveData();
    close();
    livret(c);
    toast("Mouvement enregistré ✓");
  });

  // Focus libellé
  setTimeout(() => modal.querySelector("#mvt-label").focus(), 50);
}

// ═══════════════ virements.js ═══════════════
// ─── VIREMENTS ────────────────────────────────────────────────────────────────

function virements(c) {
  const V = D.virements;

  // ── Helpers ────────────────────────────────────────────────────────────────
  const getAccountColor = name => {
    const all = [...(D.compteCourants||[]),...(D.livrets||[]),...(D.liquiditesInvest||[]),...(D.plansEpargne||[]),...(D.cryptoAccounts||[])];
    const acc = all.find(a => a.name === name);
    if (acc?.color) return acc.color;
    const bank = (D.banks||[]).find(b => b.name === acc?.bank);
    return bank?.color || "#888";
  };

  const getAccountBank = name => {
    const all = [...(D.compteCourants||[]),...(D.livrets||[]),...(D.liquiditesInvest||[]),...(D.plansEpargne||[]),...(D.cryptoAccounts||[])];
    return all.find(a => a.name === name)?.bank || "—";
  };

  // Calcule le montant à virer = somme des dépenses Budget assignées à ce compte
  const montantPourCompte = name => {
    const mensu = [...(D.budgetEssentiel||[]),...(D.budgetEnvies||[])];
    const annuel = [...(D.budgetAnnuel||[]),...(D.budgetAnnuelEnvies||[])];
    const m = mensu.filter(x => x.account === name).reduce((s,x) => s + x.amount, 0);
    const a = annuel.filter(x => x.account === name).reduce((s,x) => s + x.amount / 12, 0);
    return m + a;
  };

  // ── Construire la liste des virements depuis les comptes Budget ────────────
  const allCC      = (D.compteCourants||[]);
  const allLivrets = (D.livrets||[]);

  // Récupérer l'état arrondi depuis D.virements.arrondis (objet {nomCompte: bool})

  const revenusCompl = (V.revenusComplementaires || []).filter(r => r.amount > 0);
  const salaire = revenusCompl.reduce((s,r) => s + (r.amount||0), 0);

  // CC1 = premier compte courant (reçoit le salaire, pas un "virement")
  const cc1Name = allCC[0]?.name || null;

  // Calcul des montants — TOUS les comptes, même à zéro
  const rowsCC = allCC.map((acc, idx) => {
    const isCC1  = idx === 0;
    const raw    = isCC1 ? 0 : montantPourCompte(acc.name); // CC1 = reste calculé plus bas
    const arrondi = D.virements.arrondis[acc.name] || false;
    const montant = arrondi ? Math.ceil(raw) : Math.round(raw * 100) / 100;
    return { name: acc.name, bank: acc.bank || "—", color: getAccountColor(acc.name), raw, montant, arrondi, isCC1 };
  });

  // Montants livrets par association enveloppe → livret réel
  // D.livretAssociations = { matelas: "nom livret", economies: "...", factures: "...", projets: "..." }
  // Plusieurs enveloppes peuvent pointer vers le même livret : les montants se cumulent.
  const assoc = D.livretAssociations || {};

  // ── État d'avancement (conditionne la redirection du budget investissement) ──
  const av         = D.virements;
  const matelasAct = livretComputeSoldes()['matelas'] || 0;
  const essentiel  = computeBudget().essentiel;
  const moisMat    = av.moisMatelas || 6;
  const cibleMat   = essentiel * moisMat;
  const s1ok       = !(av.hasDettes || false);           // étape 1 validée = pas de dettes
  const s2ok       = s1ok && matelasAct >= cibleMat;     // étape 2 validée = matelas constitué
  const budgetInv  = D.budgetInvestissement || 0;

  // Livret cible pour le matelas (depuis les associations paramétrées)
  const livretMatelasName = (D.livretAssociations || {}).matelas || null;

  // Calcul des montants cibles par enveloppe (sources Budget)
  const montantParEnveloppe = {
    matelas:   () => (!s1ok || s2ok) ? 0 : budgetInv,
    economies: () => {
      const mensu = (D.budgetEnviesMensu  || []).reduce((s,x) => s + x.amount, 0);
      const ann   = (D.budgetEnviesAnnuel || []).reduce((s,x) => s + x.amount / 12, 0);
      return mensu + ann;
    },
    factures:  () => (D.budgetAnnuel || []).reduce((s,x) => s + x.amount, 0) / 12,
  };

  // Cumule les montants de TOUTES les enveloppes associées à ce livret réel
  const montantLivret = (acc) => {
    const envIds = Object.keys(assoc).filter(k => assoc[k] === acc.name);
    if (envIds.length > 0) return envIds.reduce((s, k) => s + (montantParEnveloppe[k] ? montantParEnveloppe[k]() : 0), 0);
    return montantPourCompte(acc.name); // fallback : dépenses budget assignées
  };

  const rowsLiv = allLivrets.map(acc => {
    const raw    = montantLivret(acc);
    const arrondi = D.virements.arrondis[acc.name] || false;
    const montant = arrondi ? Math.ceil(raw) : Math.round(raw * 100) / 100;
    return { name: acc.name, bank: acc.bank || "—", color: getAccountColor(acc.name), raw, montant, arrondi, isCC1: false };
  });

  // Ligne spéciale "Remboursement dettes" — visible seulement si étape 1 active
  if (!s1ok) {
    rowsLiv.push({
      name: "Remboursement dettes", bank: "—", color: "var(--loss)",
      raw: budgetInv, montant: budgetInv, arrondi: false, isCC1: false, isDette: true
    });
  }

  // ── Comptes d'investissement pour la card Virements investissements ────────
  const allInvAccounts = [
    ...(D.liquiditesInvest||[]).map(a => ({ name: a.name, bank: a.bank || '—', color: getAccountColor(a.name) })),
    ...(D.cryptoAccounts||[]).map(a => ({ name: a.name, bank: a.bank || '—', color: getAccountColor(a.name) })),
  ];


  // Répartir budgetInv entre les comptes (proportionnellement si pas encore configuré)
  const nInv = allInvAccounts.length;
  const rowsInv = allInvAccounts.map((acc) => {
    return { name: acc.name, bank: acc.bank, color: acc.color, raw: 0, montant: 0, arrondi: false, isCC1: false };
  });

  // Totaux hors CC1 (CC1 = reste)
  const totalCC  = rowsCC.filter(r => !r.isCC1).reduce((s,r) => s + r.montant, 0);
  const totalLiv = rowsLiv.reduce((s,r) => s + r.montant, 0);
  const totalInv = s2ok ? budgetInv : 0;  // redirigé vers invest seulement si étapes 1+2 validées
  const totalSort = totalCC + totalLiv + totalInv;
  const reste = salaire - totalSort;

  // Injecter le montant reste dans CC1
  if (rowsCC.length > 0) {
    rowsCC[0].raw     = reste;
    rowsCC[0].montant = reste;
  }

  // Total CC affiché dans le header = tous les CC y compris CC1 (= salaire − livrets − invest)
  const totalCCHeader = salaire - totalLiv - totalInv;

  // ══════════════════════════════════════════════════════════════════════════
  // CARD 1 — Salaire
  // ══════════════════════════════════════════════════════════════════════════
  const salCard = document.createElement("div"); salCard.className = "card";
  salCard.style.cssText = "padding:0";
  const salHead = document.createElement("div");
  salHead.className = "card-title";
  salHead.style.cssText = "margin:0;border-bottom:1px solid var(--border)";
  salHead.innerHTML = '<span>Revenus</span>';
  const salAddBtn = document.createElement('button');
  salAddBtn.className = 'app-btn app-btn--round';
  salAddBtn.title = 'Ajouter un revenu';
  salAddBtn.textContent = '+';
  salAddBtn.addEventListener('click', () => openRevComplModal(null));
  salHead.appendChild(salAddBtn);
  salCard.appendChild(salHead);
  c.appendChild(salCard);

  // ── Revenus complémentaires ──────────────────────────────────────────────
  const buildRevCompl = () => {
    const existing = salCard.querySelector('#rev-compl-section');
    if (existing) existing.remove();
    const section = document.createElement('div');
    section.id = 'rev-compl-section';
    section.style.cssText = 'padding-top:4px';

    const revs = V.revenusComplementaires || [];
    revs.forEach((rev, idx) => {
      const row = document.createElement('div');
      row.style.cssText = 'display:flex;align-items:center;gap:8px;padding:5px 10px';
      row.innerHTML = `
        <span style="flex:1;font-size:var(--text-md);color:var(--text)">${rev.name}</span>
        <span style="font-family:var(--font-mono);color:var(--text);font-size:var(--text-md)">${eur(rev.amount)}</span>
        <button class="edit-btn" data-idx="${idx}" title="Modifier"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>`;
      row.querySelector('button').addEventListener('click', () => openRevComplModal(idx));
      section.appendChild(row);
    });



    salCard.appendChild(section);
  };

  const openRevComplModal = (idx) => {
    const isEdit = idx !== null;
    const rev = isEdit ? (V.revenusComplementaires[idx] || {}) : {};
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px';
    overlay.innerHTML = `
      <div style="background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius);padding:0;width:100%;max-width:360px;animation:fadeUp .2s ease">
        <div class="card-title">${isEdit ? 'Modifier le revenu' : 'Ajouter un revenu'}</div>
        <div style="padding:0 20px 20px;display:flex;flex-direction:column;gap:12px">
          <div class="form-group">
            <label>Nom</label>
            <input class="form-input" id="rc-name" type="text" placeholder="Ex : Loyer perçu" value="${rev.name||''}">
          </div>
          <div class="form-group">
            <label>Montant (€ / mois)</label>
            <input class="form-input" id="rc-amount" type="number" step="50" placeholder="500" value="${rev.amount||''}">
          </div>
          <div style="display:grid;grid-template-columns:${isEdit?'1fr 1fr 1fr':'1fr 1fr'};gap:8px">
            ${isEdit ? '<button class="app-btn app-btn--rect" id="rc-del" style="color:var(--loss);background:var(--loss)12;border-color:var(--loss)45">Supprimer</button>' : ''}
            <button class="app-btn app-btn--rect" id="rc-cancel">Annuler</button>
            <button class="app-btn app-btn--rect app-btn--primary" id="rc-save">Enregistrer</button>
          </div>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    overlay.querySelector('#rc-cancel').addEventListener('click', () => overlay.remove());
    if (isEdit) overlay.querySelector('#rc-del').addEventListener('click', () => {
      confirmModal('Supprimer ce revenu ?', '', () => {
        V.revenusComplementaires.splice(idx, 1);
        saveData(); overlay.remove(); buildRevCompl(); recalcAll();
      });
    });
    overlay.querySelector('#rc-save').addEventListener('click', () => {
      const name   = overlay.querySelector('#rc-name').value.trim();
      const amount = parseFloat(overlay.querySelector('#rc-amount').value) || 0;
      if (!name || amount <= 0) { toast('Nom et montant obligatoires'); return; }
      if (!V.revenusComplementaires) V.revenusComplementaires = [];
      if (isEdit) { V.revenusComplementaires[idx] = { name, amount }; }
      else        { V.revenusComplementaires.push({ name, amount }); }
      saveData(); overlay.remove(); buildRevCompl(); recalcAll();
    });
  };

  buildRevCompl();

  // ══════════════════════════════════════════════════════════════════════════
  // CARD 2 — Diagramme Sankey SVG
  // ══════════════════════════════════════════════════════════════════════════
  const restePos = Math.max(0, reste);
  const resteNeg  = reste < 0;

  const sankeyCard = document.createElement("div"); sankeyCard.className = "card";
  sankeyCard.style.cssText = "padding:20px 20px 20px;overflow:visible";
  sankeyCard.innerHTML = `<div class="card-title" style="margin-bottom:16px">
    <span>Flux du salaire</span>
    <span id="sankey-warn-badge" style="display:none;align-items:center;gap:6px;flex-shrink:0;cursor:pointer">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;color:var(--loss)"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span style="display:inline-flex;align-items:center;background:var(--loss)18;border:1px solid #e0505044;border-radius:6px;padding:0 8px;height:var(--input-h);font-family:var(--font-mono);font-size:var(--text-md);color:var(--loss);cursor:pointer;box-sizing:border-box">Reste à vivre négatif</span>
    </span>
  </div>`;
  sankeyCard.querySelector('#sankey-warn-badge').addEventListener('click', () => openResteNegatifModal());

  const updateSankeyAlert = () => {
    const B = computeBudget();
    const badgeEl = sankeyCard.querySelector('#sankey-warn-badge');
    if (!badgeEl) return;
    if (B.resteAVivre < 0) {
      badgeEl.style.display = "inline-flex";
    } else {
      badgeEl.style.display = "none";
    }
  };

  const sankeyWrap = document.createElement("div");
  sankeyWrap.style.cssText = "width:100%;overflow:visible";
  sankeyCard.appendChild(sankeyWrap);
  c.appendChild(sankeyCard);

  const buildSankey = () => {
    const containerW = sankeyCard.clientWidth - 40;
    if (containerW <= 0) return;

    // ── Sources ─────────────────────────────────────────────────────────────
    const sources = (D.virements.revenusComplementaires || [])
      .filter(r => r.amount > 0)
      .map(r => ({ name: r.name, amount: r.amount, color: r.isSalaire ? '#f0a020' : 'var(--gain)' }));
    const hasMultiSrc = sources.length > 1;

    // ── Destinations ─────────────────────────────────────────────────────────
    const dests = [];
    rowsCC.forEach((r, i) => {
      const val = curCC[i];
      if (val <= 0) return;
      dests.push({ name: r.isCC1 ? `Reste sur ${r.name}` : r.name, val, color: r.color });
    });
    rowsLiv.forEach((r, i) => {
      const val = curLiv[i];
      if (val <= 0) return;
      dests.push({ name: r.name, val, color: r.color });
    });
    if (s2ok) {
      rowsInv.forEach((r, i) => {
        const val = curInv[i];
        if (val <= 0) return;
        dests.push({ name: r.name, val, color: r.color });
      });
      const totalAutoInvSankey = curInv.reduce((s,v) => s+v, 0);
      const resteInvSankey = Math.round((budgetInv - totalAutoInvSankey) * 100) / 100;
      if (resteInvSankey > 0) {
        dests.push({ name: 'Reste à investir', val: resteInvSankey, color: 'var(--text3)' });
      }
    }
    if (dests.length === 0) { sankeyWrap.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text3)">Aucune dépense assignée à des comptes</div>`; return; }

    const srcVal = (D.virements.revenusComplementaires || []).reduce((s,r) => s+(r.amount||0), 0) || 1;
    const colText = getComputedStyle(document.documentElement).getPropertyValue('--text').trim();

    // ── Layout ───────────────────────────────────────────────────────────────
    const LABEL_L  = hasMultiSrc ? 120 : 110;
    const NODE_W   = 16;
    const GAP_L    = hasMultiSrc ? 160 : 0;  // gap: sources → nœud central
    const GAP_R    = hasMultiSrc ? 160 : 200;  // gap: nœud central → destinations
    const LABEL_R  = 180;
    const GAP_NODE = 8;
    const ROW_H    = 44;
    const MIN_BAND = 8;

    // nœud central X
    const CTR_X = LABEL_L + (hasMultiSrc ? NODE_W + GAP_L : 0);
    const DST_X = CTR_X + NODE_W + GAP_R;
    const TOTAL_W = DST_X + NODE_W + LABEL_R;

    // ── Heights ──────────────────────────────────────────────────────────────
    // svgH = total height including gaps between destination nodes
    const svgH   = Math.max(dests.length * ROW_H + GAP_NODE * (dests.length - 1), 200);
    // availH = sum of node heights only (no gaps) — this is CTR_H
    const availH = svgH - GAP_NODE * (dests.length - 1);
    // Center node = sum of bands without gaps, centered in svgH
    const CTR_H  = availH;
    const CTR_Y  = (svgH - CTR_H) / 2;

    // Destination nodes — proportional to srcVal, normalized to availH, starting at y=0
    const dNodes = dests.map(d => ({ ...d, h: Math.max(MIN_BAND, (d.val / srcVal) * availH) }));
    const rawSum = dNodes.reduce((s,d) => s+d.h, 0);
    const scale  = availH / rawSum;
    let curY = 0;
    dNodes.forEach(d => { d.h = Math.max(MIN_BAND, d.h * scale); d.y = curY; curY += d.h + GAP_NODE; });
    // Total height of right column with gaps = svgH, starting at y=0 ✓

    // ── Paths: center → destinations ─────────────────────────────────────────
    let ctrOffset = 0;
    dNodes.forEach(d => { d.ctrY = CTR_Y + ctrOffset; ctrOffset += d.h; });
    const cx1r = CTR_X + NODE_W + GAP_R * 0.45;
    const cx2r = CTR_X + NODE_W + GAP_R * 0.55;
    const pathsR = dNodes.map(d => {
      const x1 = CTR_X + NODE_W, x2 = DST_X;
      return `<path d="M${x1} ${d.ctrY} C${cx1r} ${d.ctrY} ${cx2r} ${d.y} ${x2} ${d.y}
                       L${x2} ${d.y+d.h} C${cx2r} ${d.y+d.h} ${cx1r} ${d.ctrY+d.h} ${x1} ${d.ctrY+d.h} Z"
        fill="${d.color}" fill-opacity="0.45"/>`;
    });

    // ── Paths: sources → center (only if multiple sources) ───────────────────
    let pathsL = [];
    let srcRects = '';
    let srcLabels = '';

    // ── Center node: always solid amber ──────────────────────────────────────
    const ctrRects = `<rect x="${CTR_X}" y="${CTR_Y}" width="${NODE_W}" height="${CTR_H}" rx="4" fill="#f0a020"/>`;

    if (hasMultiSrc) {
      // Source nodes: each has same height as its proportional share of RIGHT column (with gaps)
      // i.e. height proportional to dNodes total height (with gaps), placed with gaps between them
      const SRC_X = LABEL_L;
      const cx1l = SRC_X + NODE_W + GAP_L * 0.45;
      const cx2l = SRC_X + NODE_W + GAP_L * 0.55;

      // Source nodes: each h = proportional slice of CTR_H (matches center node exactly)
      // Gap between sources = (svgH - CTR_H) / (sources.length - 1)
      // This ensures: sum(h_i) + gaps = CTR_H + (svgH-CTR_H) = svgH ✓
      const srcGap = sources.length > 1 ? (svgH - CTR_H) / (sources.length - 1) : 0;
      const srcNodes = sources.map(src => ({
        ...src,
        h: (src.amount / srcVal) * CTR_H
      }));
      let srcY = 0;
      srcNodes.forEach(n => {
        n.y = srcY;
        srcY += n.h + srcGap;
      });
      // Total: sum(h_i)=CTR_H, gaps=(n-1)*srcGap=svgH-CTR_H → total=svgH ✓

      // Center offsets: proportional slices of CTR_H, starting at CTR_Y
      // Source node midpoint vertically = proportional midpoint on center node
      // Each source band on center = (amount/srcVal)*CTR_H, starting from CTR_Y
      let ctrOffsetL = CTR_Y;
      srcNodes.forEach((src) => {
        const ctrH = (src.amount / srcVal) * CTR_H;
        // Bezier: from src node (src.y → src.y+src.h) to center slice (ctrOffsetL → ctrOffsetL+ctrH)
        pathsL.push(`<path d="M${SRC_X+NODE_W} ${src.y} C${cx1l} ${src.y} ${cx2l} ${ctrOffsetL} ${CTR_X} ${ctrOffsetL}
                              L${CTR_X} ${ctrOffsetL+ctrH} C${cx2l} ${ctrOffsetL+ctrH} ${cx1l} ${src.y+src.h} ${SRC_X+NODE_W} ${src.y+src.h} Z"
          fill="${src.color}" fill-opacity="0.35"/>`);
        // source rect — vertically centered relative to its center-slice midpoint
        srcRects += `<rect x="${SRC_X}" y="${src.y.toFixed(1)}" width="${NODE_W}" height="${src.h.toFixed(1)}" rx="3" fill="${src.color}"/>`;
        // source label — centered on src node
        const midY = src.y + src.h/2;
        srcLabels += `
          <text x="${SRC_X-8}" y="${midY-7}" dominant-baseline="middle" text-anchor="end" font-family="Instrument Sans,sans-serif" font-size="12" font-weight="600" fill="${colText}">${src.name}</text>
          <text x="${SRC_X-8}" y="${midY+7}" dominant-baseline="middle" text-anchor="end" font-family="DM Mono,monospace" font-size="11" fill="${src.color}">${eur(src.amount)}</text>`;
        ctrOffsetL += ctrH;
      });

      // Verify alignment: ctrOffsetL should equal CTR_Y + CTR_H ✓
    } else {
      // Single source: label left of center node
      const midY = CTR_Y + CTR_H/2;
      srcLabels = `
        <text x="${CTR_X-8}" y="${midY-7}" dominant-baseline="middle" text-anchor="end" font-family="Instrument Sans,sans-serif" font-size="12" font-weight="600" fill="${colText}">${sources[0].name}</text>
        <text x="${CTR_X-8}" y="${midY+7}" dominant-baseline="middle" text-anchor="end" font-family="DM Mono,monospace" font-size="11" fill="#f0a020">${eur(sources[0].amount)}</text>`;
    }

    // ── Destination nodes + labels ────────────────────────────────────────────
    const dstRects  = dNodes.map(d => `<rect x="${DST_X}" y="${d.y}" width="${NODE_W}" height="${d.h}" rx="3" fill="${d.color}"/>`).join('');
    const dstLabels = dNodes.map(d => {
      const midY = d.y + d.h/2;
      const pct  = (d.val / srcVal * 100).toFixed(1);
      const lx   = DST_X + NODE_W + 10;
      if (d.h < 22) return `<text x="${lx}" y="${midY}" dominant-baseline="middle" font-family="Instrument Sans,sans-serif" font-size="11" font-weight="600" fill="${colText}">${d.name}  <tspan font-family="DM Mono,monospace" font-size="10" fill="${d.color}">${eur(d.val)}</tspan></text>`;
      return `
        <text x="${lx}" y="${midY-8}" dominant-baseline="middle" font-family="Instrument Sans,sans-serif" font-size="12" font-weight="600" fill="${colText}">${d.name}</text>
        <text x="${lx}" y="${midY+8}" dominant-baseline="middle" font-family="DM Mono,monospace" font-size="10" fill="${d.color}">${eur(d.val)}  ·  ${pct}%</text>`;
    }).join('');

    sankeyWrap.innerHTML = `
      <svg viewBox="0 0 ${TOTAL_W} ${svgH}" width="100%" height="${svgH}" style="overflow:visible;display:block">
        <defs><style>text { user-select:none; }</style></defs>
        ${pathsL.join('')}
        ${pathsR.join('')}
        ${srcRects}
        ${ctrRects}
        ${dstRects}
        ${srcLabels}
        ${dstLabels}
      </svg>`;
  };

  // Render après insertion DOM
  requestAnimationFrame(() => { buildSankey(); updateSankeyAlert(); });

  // ══════════════════════════════════════════════════════════════════════════
  // État partagé des montants courants (mis à jour par les toggles)
  // ══════════════════════════════════════════════════════════════════════════
  // curCC[i] et curLiv[i] = montant actuellement affiché pour chaque ligne
  const curCC  = rowsCC.map(r => r.montant);
  const curLiv = rowsLiv.map(r => r.montant);
  const curInv = rowsInv.map(r => r.montant);

  // Registres DOM : amtEl et totalEl par groupe, pour les mises à jour
  const amtElsCC  = {}; // nom → élément DOM montant (CC)
  const amtElsLiv = {}; // nom → élément DOM montant (Livrets)
  const amtElsInv = {}; // nom → élément DOM montant (Invest)
  let totalElCC  = null;
  let totalElLiv = null;
  let totalElInv = null;

  // Recalcul central : CC1 absorbe le reste, puis met à jour tous les DOM
  const recalcAll = () => {
    const salaireNow = (D.virements.revenusComplementaires || []).reduce((s,r) => s + (r.amount||0), 0);
    const cc1Idx = rowsCC.findIndex(r => r.isCC1);
    const totalAutresCC = curCC.reduce((s, v, i) => i === cc1Idx ? s : s + v, 0);
    const totalLivCur   = curLiv.reduce((s, v) => s + v, 0);
    const totalInvCur   = s2ok ? budgetInv : 0;
    const newCC1 = salaireNow - totalAutresCC - totalLivCur - totalInvCur;

    if (cc1Idx !== -1) {
      curCC[cc1Idx] = newCC1;
      rowsCC[cc1Idx].raw = newCC1;
      const el = amtElsCC[rowsCC[cc1Idx].name];
      if (el) { el.textContent = eur(newCC1); el.className = `vir-flux-amount${newCC1 < 0 ? " zero" : ""}`; }
    }

    if (totalElCC)  totalElCC.textContent  = eur(totalAutresCC + newCC1);
    if (totalElLiv) totalElLiv.textContent = eur(totalLivCur);
    if (totalElInv) totalElInv.textContent = eur(s2ok ? budgetInv : 0);

    buildSankey();
    updateSankeyAlert();
  };

  // ══════════════════════════════════════════════════════════════════════════
  // Fonction helper pour construire un groupe de flux
  // ══════════════════════════════════════════════════════════════════════════
  const buildFluxGroup = (title, rows, color, groupTotal, isCC = false, isLiv = false) => {
    const card = document.createElement("div"); card.className = "card";
    card.style.padding = "0";

    const totalId = `vir-total-${title.replace(/\s+/g,"-")}`;
    const header = document.createElement("div");
    header.className = "card-title";
    header.style.cssText = "margin:0;border-bottom:1px solid var(--border)";
    header.innerHTML = `
      <span>${title}</span>
      <span id="${totalId}" style="font-family:var(--font-mono);color:var(--amber)">${eur(groupTotal)}</span>`;

    // Sauvegarder la référence DOM du total header
    if (isCC)      setTimeout(() => { totalElCC  = document.getElementById(totalId); }, 0);
    else if (isLiv) setTimeout(() => { totalElLiv = document.getElementById(totalId); }, 0);
    else           setTimeout(() => { totalElInv = document.getElementById(totalId); }, 0);

    card.appendChild(header);

    const body = document.createElement("div");
    body.style.cssText = "padding:6px 0";

    if (rows.length === 0) {
      const empty = document.createElement("div");
      empty.style.cssText = "padding:16px 18px;font-size:var(--text-md);color:var(--text3);text-align:center";
      if (!isCC && !isLiv) {
        // Groupe investissements — message selon étape
        if (!s1ok)       empty.textContent = "Budget redirigé vers le remboursement des dettes (étape 1)";
        else if (!s2ok)  empty.textContent = "Budget redirigé vers le matelas de sécurité (étape 2)";
        else             empty.textContent = "Aucun virement d'investissement configuré";
      } else {
        empty.textContent = "Aucune dépense assignée à un compte de ce groupe";
      }
      body.appendChild(empty);
    } else {
      rows.forEach((row, rowIdx) => {
        const r = document.createElement("div"); r.className = "vir-flux-row";

        const left = document.createElement("div");
        left.style.cssText = "display:flex;align-items:center;gap:9px;flex:1;min-width:0";
        const label = row.isCC1 ? `Reste sur ${row.name}` : row.isDette ? `Remboursement dettes` : `Virement vers ${row.name}`;
        left.innerHTML = `
          <svg width="14" height="14" fill="none" stroke="var(--text3)" stroke-width="1.5" viewBox="0 0 24 24" style="flex-shrink:0">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/>
          </svg>
          <div class="vir-flux-name">${label}</div>`;

        const pill = document.createElement("span");
        pill.style.cssText = `font-size:var(--text-md);font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;background:${row.color}15;border:1px solid ${row.color}45;color:${row.color};max-width:130px;overflow:hidden;text-overflow:ellipsis`;
        pill.textContent = row.bank;
        pill.title = row.bank;

        const amtEl = document.createElement("div");
        amtEl.className = `vir-flux-amount${row.montant === 0 ? " zero" : ""}`;
        amtEl.textContent = eur(row.montant);
        if (isCC)       amtElsCC[row.name]  = amtEl;
        else if (isLiv) amtElsLiv[row.name] = amtEl;
        else            amtElsInv[row.name] = amtEl;

        const arrBtn = document.createElement("button");
        arrBtn.className = `toggle-sw${row.arrondi && !row.isCC1 ? " on" : ""}`;
        arrBtn.title = row.isCC1 ? "Calculé automatiquement" : "Arrondir au € supérieur";
        if (row.isCC1 || row.isDette) arrBtn.style.cssText = "opacity:0;cursor:default;pointer-events:none";

        arrBtn.addEventListener("click", () => {
          if (row.isCC1) return;
          const newVal = !D.virements.arrondis[row.name];
          D.virements.arrondis[row.name] = newVal;
          arrBtn.classList.toggle("on", newVal);
          const newMontant = newVal ? Math.ceil(row.raw) : Math.round(row.raw * 100) / 100;
          amtEl.textContent = eur(newMontant);
          amtEl.className = `vir-flux-amount${newMontant === 0 ? " zero" : ""}`;

          // Mettre à jour l'état partagé
          if (isCC)       curCC[rowIdx]  = newMontant;
          else if (isLiv) curLiv[rowIdx] = newMontant;
          else            { curInv[rowIdx] = newMontant; D.virements.investissementsRep[row.name] = newMontant; }

          recalcAll();
          saveData();
        });

        r.appendChild(left);
        r.appendChild(pill);
        r.appendChild(amtEl);
        r.appendChild(arrBtn);
        body.appendChild(r);
      });
    }
    card.appendChild(body);
    return card;
  };

  // ── Affichage des 3 groupes ───────────────────────────────────────────────
  c.appendChild(buildFluxGroup("Virements comptes courants", rowsCC, "var(--chart5)", totalCCHeader, true,  false));
  c.appendChild(buildFluxGroup("Virements livrets",          rowsLiv, "var(--chart2)", totalLiv,     false, true));
  // ── Card Virements investissements — répartition via % cibles Bourse ────────
  {
    const secToDcaVir = { etfPositions:'dcaETF', stockPositions:'dcaActions', cryptoPositions:'dcaCrypto' };
    const autoInvestByAccount = {};
    ['etfPositions','stockPositions','cryptoPositions'].forEach(sec => {
      const dcaKey = secToDcaVir[sec];
      const dcaPct = dcaKey ? (D.virements[dcaKey] || 0) : 0;
      (D[sec]||[]).forEach(pos => {
        if (!pos.autoInvest || !pos.account || !pos.target || !dcaPct) return;
        const montant = Math.round(budgetInv * (dcaPct/100) * (pos.target/100) * 100) / 100;
        autoInvestByAccount[pos.account] = (autoInvestByAccount[pos.account] || 0) + montant;
      });
    });

    const computeInvMontants = () => rowsInv.map(row =>
      Math.round((autoInvestByAccount[row.name] || 0) * 100) / 100
    );

    const invCard = document.createElement("div"); invCard.className = "card";
    invCard.style.padding = "0";

    const invHeader = document.createElement("div");
    invHeader.className = "card-title";
    invHeader.style.cssText = "margin:0;border-bottom:1px solid var(--border)";
    invHeader.innerHTML = `
      <span>Virements investissements</span>
      <span id="vir-total-Virements-investissements" style="font-family:var(--font-mono);color:var(--amber)">${eur(budgetInv)}</span>`;
    setTimeout(() => { totalElInv = document.getElementById("vir-total-Virements-investissements"); }, 0);
    invCard.appendChild(invHeader);

    const invBody = document.createElement("div");
    invBody.style.cssText = "padding:6px 0";

    if (!s2ok) {
      const empty = document.createElement("div");
      empty.style.cssText = "padding:16px 18px;font-size:var(--text-md);color:var(--text3);text-align:center";
      empty.textContent = !s1ok ? "Budget redirigé vers le remboursement des dettes (étape 1)" : "Budget redirigé vers le matelas de sécurité (étape 2)";
      invBody.appendChild(empty);
    } else if (rowsInv.length === 0) {
      const empty = document.createElement("div");
      empty.style.cssText = "padding:16px 18px;font-size:var(--text-md);color:var(--text3);text-align:center";
      empty.textContent = "Aucun compte d'investissement configuré";
      invBody.appendChild(empty);
    } else {
      const computed = computeInvMontants();
      const totalAutoInv = computed.reduce((s,v) => s+v, 0);
      const resteInv = Math.round((budgetInv - totalAutoInv) * 100) / 100;
      computed.forEach((v, i) => { curInv[i] = v; });

      const resteRow = document.createElement("div");
      resteRow.className = "vir-flux-row";
      const resteLeft = document.createElement("div");
      resteLeft.style.cssText = "display:flex;align-items:center;gap:9px;flex:1;min-width:0";
      resteLeft.innerHTML = `
        <svg width="14" height="14" fill="none" stroke="var(--text3)" stroke-width="1.5" viewBox="0 0 24 24" style="flex-shrink:0">
          <line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/>
        </svg>
        <div class="vir-flux-name">Reste à investir</div>`;
      const resteAmt = document.createElement("div");
      resteAmt.className = `vir-flux-amount${resteInv < 0 ? " zero" : ""}`;
      if (resteInv < 0) resteAmt.style.color = "var(--loss)";
      resteAmt.textContent = eur(resteInv);
      resteRow.appendChild(resteLeft); resteRow.appendChild(resteAmt);
      invBody.appendChild(resteRow);

      rowsInv.forEach((row, rowIdx) => {
        const r = document.createElement("div"); r.className = "vir-flux-row";
        const left = document.createElement("div");
        left.style.cssText = "display:flex;align-items:center;gap:9px;flex:1;min-width:0";
        left.innerHTML = `
          <svg width="14" height="14" fill="none" stroke="var(--text3)" stroke-width="1.5" viewBox="0 0 24 24" style="flex-shrink:0">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="13 6 19 12 13 18"/>
          </svg>
          <div class="vir-flux-name">Virement vers ${row.name}</div>`;
        const pill = document.createElement("span");
        pill.style.cssText = `font-size:var(--text-md);font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap;flex-shrink:0;background:${row.color}15;border:1px solid ${row.color}45;color:${row.color};max-width:110px;overflow:hidden;text-overflow:ellipsis`;
        pill.textContent = row.bank; pill.title = row.bank;
        const montant = computed[rowIdx];
        const amtEl = document.createElement("div");
        amtEl.className = `vir-flux-amount${montant === 0 ? " zero" : ""}`;
        amtEl.textContent = eur(montant);
        amtElsInv[row.name] = amtEl;
        r.appendChild(left); r.appendChild(pill); r.appendChild(amtEl);
        invBody.appendChild(r);
      });

      if (totalAutoInv === 0) {
        const hint = document.createElement("div");
        hint.style.cssText = "padding:10px 16px;font-size:var(--text-sm);color:var(--text3);text-align:center";
        hint.textContent = "Cochez \"Investissement auto\" sur vos actifs dans l'onglet Bourse pour répartir automatiquement";
        invBody.appendChild(hint);
      }

      recalcAll();
    }

    invCard.appendChild(invBody);
    c.appendChild(invCard);
  }

  // ── Bouton "Faire les virements" ─────────────────────────────────────────
  const virBtnWrap = document.createElement("div");
  virBtnWrap.style.cssText = "display:flex;justify-content:center;margin-top:8px";
  const virBtn = document.createElement("button");
  virBtn.className = "app-btn app-btn--rect app-btn--primary";
  virBtn.style.cssText = "display:flex;align-items:center;gap:7px;flex-shrink:0";
  virBtn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>Faire les virements`;
  virBtn.addEventListener("click", () => doVirements());
  virBtnWrap.appendChild(virBtn);
  c.appendChild(virBtnWrap);

  // ── Logique "Faire les virements" ────────────────────────────────────────
  function doVirements() {
    const today = new Date().toISOString().slice(0, 10);
    const thisMonth = today.slice(0, 7);

    // Montants arrondis depuis rowsLiv (respecte le toggle arrondi de l'utilisateur)
    // rowsLiv = [{ name, montant, ... }] — montant déjà arrondi si toggle activé
    // On mappe par association enveloppe → montant
    const assocLocal = D.livretAssociations || {};
    const montantsEnv = {};
    D.livretEnveloppes.forEach(env => {
      // Trouve le livret associé à cette enveloppe
      const livretName = assocLocal[env.id];
      if (!livretName) {
        // Pas d'association → montant brut de montantParEnveloppe
        const brut = {
          matelas:   (!s1ok || s2ok) ? 0 : budgetInv,
          economies: (D.budgetEnviesMensu||[]).reduce((s,x)=>s+x.amount,0) + (D.budgetEnviesAnnuel||[]).reduce((s,x)=>s+x.amount/12,0),
          factures:  (D.budgetAnnuel||[]).reduce((s,x)=>s+x.amount,0) / 12,
          projets:   0,
        }[env.id] || 0;
        montantsEnv[env.id] = Math.round(brut * 100) / 100;
      } else {
        // Cherche dans rowsLiv le montant affiché (déjà arrondi si toggle)
        const row = rowsLiv.find(r => r.name === livretName);
        if (row) {
          // Répartit le montant du livret proportionnellement entre les enveloppes qui lui sont associées
          const envsDuLivret = Object.keys(assocLocal).filter(k => assocLocal[k] === livretName);
          const brutsParEnv = {};
          const bruts = {
            matelas:   (!s1ok || s2ok) ? 0 : budgetInv,
            economies: (D.budgetEnviesMensu||[]).reduce((s,x)=>s+x.amount,0) + (D.budgetEnviesAnnuel||[]).reduce((s,x)=>s+x.amount/12,0),
            factures:  (D.budgetAnnuel||[]).reduce((s,x)=>s+x.amount,0) / 12,
            projets:   0,
          };
          const totalBrut = envsDuLivret.reduce((s,k) => s+(bruts[k]||0), 0);
          envsDuLivret.forEach(k => {
            brutsParEnv[k] = totalBrut > 0 ? row.montant * (bruts[k]||0) / totalBrut : 0;
          });
          montantsEnv[env.id] = Math.round((brutsParEnv[env.id] || 0) * 100) / 100;
        }
      }
    });

    // Résumé à afficher dans la modale de confirmation
    const lignes = D.livretEnveloppes
      .map(env => ({ env, val: montantsEnv[env.id] || 0 }))
      .filter(x => x.val > 0);

    if (lignes.length === 0) { toast("Aucun montant à virer"); return; }

    const dejaFait = (D.livretMouvements||[]).some(m =>
      m.label === "Virement auto" && m.date && m.date.slice(0,7) === thisMonth
    );

    const execute = () => {
      const mvt = { date: today, label: "Virement auto" };
      lignes.forEach(({ env, val }) => { mvt[env.id + "_add"] = val; });
      D.livretMouvements.push(mvt);
      D.livretMouvements.sort((a,b) => a.date.localeCompare(b.date));

      // Incrémenter le solde du livret réel associé dans Patrimoine
      const assocLocal = D.livretAssociations || {};
      const livretDelta = {}; // cumule par livret réel si plusieurs enveloppes → même livret
      lignes.forEach(({ env, val }) => {
        const livretName = assocLocal[env.id];
        if (livretName) livretDelta[livretName] = (livretDelta[livretName] || 0) + val;
      });
      Object.entries(livretDelta).forEach(([name, delta]) => {
        const livret = (D.livrets || []).find(l => l.name === name);
        if (livret) livret.amount = Math.round(((livret.amount || 0) + delta) * 100) / 100;
      });

      saveData();
      navigate("livret");
      toast("Virements enregistrés ✓");
    };

    // Modale de confirmation (toujours affichée)
    const overlay = document.createElement("div");
    overlay.style.cssText = "position:fixed;inset:0;background:#00000088;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px";

    const dejaFaitBanner = dejaFait ? `<div style="background:var(--amber)18;border:1px solid #f0a02055;border-radius:6px;padding:8px 12px;color:var(--amber);margin-bottom:14px">⚠ Un virement automatique a déjà été effectué ce mois-ci.</div>` : "";

    overlay.innerHTML = `
      <div style="background:var(--surface);border:1px solid #f0a02055;border-radius:var(--radius);padding:0;width:100%;max-width:400px;animation:fadeUp .2s ease">
        <div class="card-title">Confirmer les virements</div>
        <div style="padding:6px 20px 20px">
        ${dejaFaitBanner}
        <div style="margin-bottom:18px;display:flex;flex-direction:column;gap:8px">
          ${lignes.map(({ env, val }) => `
            <div style="display:flex;align-items:center;justify-content:space-between">
              <span style="display:flex;align-items:center;gap:6px">
                <span style="width:8px;height:8px;border-radius:50%;background:${env.color};display:inline-block;flex-shrink:0"></span>
                ${env.name}
              </span>
              <span style="font-family:var(--font-mono);color:var(--amber)">${eur(val)}</span>
            </div>`).join("")}
          <div style="border-top:1px solid var(--border);padding-top:8px;display:flex;justify-content:space-between">
            <span>Total</span>
            <span style="font-family:var(--font-mono);color:var(--amber)">${eur(lignes.reduce((s,x)=>s+x.val,0))}</span>
          </div>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end">
          <button class="app-btn app-btn--rect" id="vir-cancel">Annuler</button>
          <button class="app-btn app-btn--rect app-btn--primary" id="vir-confirm">Confirmer</button>
        </div>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    overlay.querySelector("#vir-cancel").addEventListener("click", () => overlay.remove());
    overlay.querySelector("#vir-confirm").addEventListener("click", () => { overlay.remove(); execute(); });
    overlay.addEventListener("pointerdown", e => { if (e.target === overlay) overlay.remove(); });
  }

  // Appel initial après que les setTimeout de buildFluxGroup ont rempli les refs DOM
  setTimeout(() => recalcAll(), 0);
}
