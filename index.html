<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">

    <nav id="nav">

        Dashboard
      </div>
      <div class="nav-item" data-page="patrimoine">

        Patrimoine
      </div>
      <div class="nav-item" data-page="budget">
