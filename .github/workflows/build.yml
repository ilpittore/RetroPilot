name: Build RetroPilot

on:
  push:
    tags:
      - 'v*'   # Se déclenche quand tu pousses un tag genre v1.0.0

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build .dmg (Mac)
        run: npm run build:mac

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: RetroPilot-mac
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build .exe (Windows)
        run: npm run build:win

      - name: Upload .exe
        uses: actions/upload-artifact@v4
        with:
          name: RetroPilot-win
          path: dist/*.exe

  # Créer une Release GitHub avec les deux fichiers
  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    steps:
      - name: Download Mac build
        uses: actions/download-artifact@v4
        with:
          name: RetroPilot-mac
          path: dist/

      - name: Download Win build
        uses: actions/download-artifact@v4
        with:
          name: RetroPilot-win
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
