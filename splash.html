<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      user-select: none;
      overflow: hidden;
    }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      margin-bottom: 28px;
      animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes pop {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .name {
      color: #ffffff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      animation: fadein 0.4s 0.1s both;
    }

    .tagline {
      color: #666;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 40px;
      animation: fadein 0.4s 0.2s both;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .bar-wrap {
      width: 160px;
      height: 3px;
      background: #1e2130;
      border-radius: 99px;
      overflow: hidden;
      animation: fadein 0.4s 0.3s both;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: #f0a500;
      border-radius: 99px;
      animation: load 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes load {
      0%   { width: 0%; }
      60%  { width: 75%; }
      90%  { width: 90%; }
      100% { width: 100%; }
    }
  </style>
</head>
<body>
  <img class="logo" src="logo.png" alt="RetroPilot">
  <div class="name">RetroPilot</div>
  <div class="tagline">Dashboard finances</div>
  <div class="bar-wrap">
    <div class="bar"></div>
  </div>
</body>
</html>
